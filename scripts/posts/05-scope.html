<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Renovo AI — Checkouts. Claims. Disputes.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    .eyebrow { margin-bottom: 40px; }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .line {
      font-size: 124px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #ffffff;
    }
    .line.muted { color: rgba(255,255,255,0.55); }
    .line.final {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #10b981;
      margin-top: 24px;
      letter-spacing: -0.02em;
    }
    .divider {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, #10b981 0%, rgba(16,185,129,0.3) 100%);
      border-radius: 2px;
      margin: 28px 0 24px;
    }
    .sub {
      margin-top: 48px;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: rgba(226,232,240,0.78);
      max-width: 860px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="post-head">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="14" y="24" width="80" height="18" rx="9" fill="#ffffff" />
          <rect x="24" y="55" width="80" height="18" rx="9" fill="#ffffff" />
          <rect x="34" y="86" width="80" height="18" rx="9" fill="#10b981" />
          <rect x="34.5" y="86.5" width="79" height="2" rx="1" fill="#ffffff" opacity="0.35" />
        </svg>
        <span class="brand-name">Renovo AI</span>
      </div>
      <div class="url"><span class="arrow">&rarr;</span>renovoai.co.uk</div>
    </div>

    <div class="post-body">
      <div class="eyebrow">
        <span class="pulse"></span>
        Built for UK letting agencies
      </div>

      <div class="stack">
        <div class="line">Checkouts.</div>
        <div class="line">Claims.</div>
        <div class="line">Disputes.</div>
        <div class="divider"></div>
        <div class="line final">One workflow.</div>
      </div>

      <p class="sub">Stop juggling six tools between inventory, checkout, and the deposit scheme. Renovo is the single place every end-of-tenancy case lives.</p>
    </div>

    <div class="post-foot">
      <span class="foot-label">Renovo AI &middot; 2026</span>
      <span class="foot-schemes">Reapit ready<span class="dot"></span>SDS<span class="dot"></span>DPS<span class="dot"></span>TDS<span class="dot"></span>mDp</span>
    </div>
  </div>
</body>
</html>
