<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Renovo AI — 8 days</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    .eyebrow { margin-bottom: 36px; }
    .big {
      font-size: 360px;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.88;
      color: #ffffff;
      display: flex;
      align-items: baseline;
      gap: 24px;
    }
    .big .unit {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 150px;
      letter-spacing: -0.02em;
      color: #10b981;
    }
    .sub {
      margin-top: 32px;
      font-size: 54px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #ffffff;
      line-height: 1.05;
    }
    .sub em {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #10b981;
    }
    .note {
      margin-top: 28px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: rgba(226,232,240,0.7);
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="post-head">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="14" y="24" width="80" height="18" rx="9" fill="#ffffff" />
          <rect x="24" y="55" width="80" height="18" rx="9" fill="#ffffff" />
          <rect x="34" y="86" width="80" height="18" rx="9" fill="#10b981" />
          <rect x="34.5" y="86.5" width="79" height="2" rx="1" fill="#ffffff" opacity="0.35" />
        </svg>
        <span class="brand-name">Renovo AI</span>
      </div>
      <div class="url"><span class="arrow">&rarr;</span>renovoai.co.uk</div>
    </div>

    <div class="post-body">
      <div class="eyebrow">
        <span class="pulse"></span>
        Average across Renovo claims
      </div>

      <div class="big">8<span class="unit">days</span></div>

      <p class="sub">From checkout to <em>released deposit.</em></p>
      <p class="note">Industry average is 4&ndash;6 weeks. Renovo gets there in a working week.</p>
    </div>

    <div class="post-foot">
      <span class="foot-label">Renovo AI &middot; End of tenancy automation</span>
      <span class="foot-schemes">renovoai.co.uk</span>
    </div>
  </div>
</body>
</html>
