<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Renovo AI — Email signature logo tile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 144px; height: 144px; overflow: hidden; }
    body { background: #ffffff; }

    .tile {
      width: 144px;
      height: 144px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 58%, rgba(16,185,129,0.22) 0%, rgba(16,185,129,0.04) 50%, transparent 75%),
        linear-gradient(180deg, #0a0e1a 0%, #05070f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mark { width: 82px; height: 82px; display: block; }
  </style>
</head>
<body>
  <div class="tile">
    <svg class="mark" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="14" y="24" width="80" height="18" rx="9" fill="#ffffff" opacity="0.7" />
      <rect x="24" y="55" width="80" height="18" rx="9" fill="#ffffff" opacity="0.92" />
      <rect x="34" y="86" width="80" height="18" rx="9" fill="#10b981" />
    </svg>
  </div>
</body>
</html>
