<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" role="img" aria-label="Ayesha Ali Khan Makeup Studio horizontal">
  <defs>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9a66a"/>
      <stop offset="0.5" stop-color="#f3d7a5"/>
      <stop offset="1" stop-color="#8a5a2b"/>
    </linearGradient>
    <linearGradient id="ghs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c488"/>
      <stop offset="1" stop-color="#a8763d"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="280" fill="#0d0a08"/>

  <!-- Monogram mark -->
  <g transform="translate(30,40)">
    <circle cx="100" cy="100" r="98" fill="none" stroke="url(#gh)" stroke-width="1"/>
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gh)" stroke-width="2"/>
    <g font-family="Didot, 'Bodoni MT', 'Playfair Display', 'Times New Roman', serif"
       font-weight="300"
       fill="url(#ghs)"
       text-anchor="middle">
      <text x="65" y="134" font-size="96" letter-spacing="-6">A</text>
      <text x="100" y="137" font-size="112" letter-spacing="-6">A</text>
      <text x="138" y="134" font-size="96" letter-spacing="-6">K</text>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="270" y1="60" x2="270" y2="220" stroke="url(#gh)" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="300" y="128"
        font-family="Didot, 'Bodoni MT', 'Playfair Display', 'Times New Roman', serif"
        font-weight="400"
        font-size="60"
        letter-spacing="9"
        fill="#f7ecd7">
    AYESHA ALI KHAN
  </text>

  <!-- Gold separator with diamond -->
  <g stroke="url(#gh)" stroke-width="1" fill="url(#gh)">
    <line x1="300" y1="158" x2="460" y2="158"/>
    <line x1="500" y1="158" x2="900" y2="158"/>
    <path d="M 480 151 l 8 7 -8 7 -8 -7 z"/>
  </g>

  <text x="300" y="190"
        font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-weight="300"
        font-size="16"
        letter-spacing="16"
        fill="url(#ghs)">
    M A K E U P   S T U D I O
  </text>

  <text x="300" y="222"
        font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500"
        font-size="10"
        letter-spacing="9"
        fill="#b98447">
    ELITE CLASS ATELIER · BY APPOINTMENT
  </text>
</svg>
