<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Renovo AI — 91% award rate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    .eyebrow { margin-bottom: 36px; }
    .big {
      font-size: 340px;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.88;
      color: #10b981;
      display: flex;
      align-items: flex-start;
    }
    .big .pct {
      font-size: 200px;
      line-height: 1;
      margin-top: 36px;
      margin-left: 8px;
      color: #10b981;
      font-weight: 600;
    }
    .sub {
      margin-top: 32px;
      font-size: 58px;
      font-weight: 700;
      letter-spacing: -0.035em;
      color: #ffffff;
      line-height: 1.02;
    }
    .sub em {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #10b981;
    }
    .note {
      margin-top: 26px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: rgba(226,232,240,0.7);
      max-width: 880px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="post-head">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="14" y="24" width="80" height="18" rx="9" fill="#ffffff" />
          <rect x="24" y="55" width="80" height="18" rx="9" fill="#ffffff" />
          <rect x="34" y="86" width="80" height="18" rx="9" fill="#10b981" />
          <rect x="34.5" y="86.5" width="79" height="2" rx="1" fill="#ffffff" opacity="0.35" />
        </svg>
        <span class="brand-name">Renovo AI</span>
      </div>
      <div class="url"><span class="arrow">&rarr;</span>renovoai.co.uk</div>
    </div>

    <div class="post-body">
      <div class="eyebrow">
        <span class="pulse"></span>
        Scheme adjudication outcomes
      </div>

      <div class="big">91<span class="pct">%</span></div>

      <p class="sub">Award rate at <em>adjudication.</em></p>
      <p class="note">Every Renovo deduction is evidenced, reasoned, and precedent-cited. When a case goes to the scheme, it wins &mdash; nine times out of ten.</p>
    </div>

    <div class="post-foot">
      <span class="foot-label">Renovo AI &middot; 2026</span>
      <span class="foot-schemes">SafeDeposits<span class="dot"></span>DPS<span class="dot"></span>TDS<span class="dot"></span>mydeposits</span>
    </div>
  </div>
</body>
</html>
