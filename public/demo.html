function renderTenantPortal(){
  var cs=CASES.find(function(c){return c.id===state.tenantPortalCase})||CASES[1]
  var defects=WS_DEFECTS
  var totalClaim=defects.filter(function(d){return!d.excluded}).reduce(function(s,d){return s+(d.adjustedCost||d.estimatedCost)},0)
  var tabs=[{k:'overview',l:'My Case'},{k:'deductions',l:'Proposed Deductions'},{k:'evidence',l:'Evidence'},{k:'messages',l:'Messages'}]
  var responses=state.tenantResponses[cs.id]||{}
  var respondedCount=Object.keys(responses).length
  var activeDefects=defects.filter(function(d){return!d.excluded})
  return'<div class="fade-in space-y-5">'+
    '<div style="padding:16px 20px;background:linear-gradient(135deg,var(--emerald-50),var(--sky-50));border:1px solid var(--emerald-200);border-radius:var(--radius-md);display:flex;align-items:center;gap:12px">'+
      '<div style="width:40px;height:40px;border-radius:50%;background:var(--emerald-100);color:var(--emerald-600);display:flex;align-items:center;justify-content:center">'+luc('user',20)+'</div>'+
      '<div style="flex:1"><div style="font-size:16px;font-weight:600">Tenant Portal</div><div class="text-sm text-muted">Simulated view — how '+cs.tenant+' sees their deposit case</div></div>'+
    '</div>'+
    '<div class="card card-p"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
      '<div style="width:44px;height:44px;border-radius:50%;background:var(--sky-50);color:var(--sky-700);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600">'+cs.tenant.split(' ').map(function(n){return n[0]}).join('')+'</div>'+
      '<div style="flex:1"><div style="font-size:15px;font-weight:600">'+cs.tenant+'</div><div class="text-sm text-muted">'+cs.property+'</div></div>'+
      (respondedCount>0?'<span class="badge badge-emerald" style="font-size:10px">'+respondedCount+'/'+activeDefects.length+' responded</span>':'')+
    '</div>'+
    '<div class="tabs">'+tabs.map(function(t){return'<button class="tab '+(state.tenantPortalTab===t.k?'active':'')+'" onclick="state.tenantPortalTab=\''+t.k+'\';render()" aria-label="'+t.l+'">'+t.l+'</button>'}).join('')+'</div></div>'+
    '<div class="mt-4">'+renderTenantPortalTab(cs,defects,totalClaim)+'</div>'+
  '</div>'
}
function renderTenantPortalTab(cs,defects,totalClaim){
  var t=state.tenantPortalTab
  var caseId=cs.id
  var responses=state.tenantResponses[caseId]||{}
  var activeDefects=defects.filter(function(d){return!d.excluded})
  if(t==='overview'){
    var sm=STATUS_META[cs.status]
    var summary=getNegotiationSummary(caseId)
    return'<div class="grid-3">'+
      '<div class="stat-card"><div class="stat-label">Case Status</div><div class="mt-2">'+badge(sm.label,sm.badge)+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Deposit Held</div><div class="stat-value tabnum">'+fmt(cs.deposit)+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Proposed Return</div><div class="stat-value tabnum" style="color:var(--emerald-600)">'+fmt(cs.deposit-totalClaim)+'</div></div>'+
    '</div>'+
    (Object.keys(responses).length>0?'<div class="card card-p mt-4"><h4 class="mb-3">Your Response Summary</h4>'+
      '<div class="negotiation-summary"><div class="space-y-4">'+
        (summary.accepted.length?'<div class="neg-summary-row"><span style="color:var(--emerald-600)">'+luc('check-circle',14)+'</span><span class="font-medium" style="color:var(--emerald-700)">'+summary.accepted.length+' accepted</span><span class="text-muted">\u2014 '+fmt(summary.accepted.reduce(function(s,d){return s+(d.adjustedCost||d.estimatedCost)},0))+'</span></div>':'')+
        (summary.disputed.length?'<div class="neg-summary-row"><span style="color:var(--rose-600)">'+luc('x-circle',14)+'</span><span class="font-medium" style="color:var(--rose-700)">'+summary.disputed.length+' disputed</span><span class="text-muted">\u2014 '+fmt(summary.disputed.reduce(function(s,d){return s+(d.adjustedCost||d.estimatedCost)},0))+'</span></div>':'')+
        (summary.countered.length?'<div class="neg-summary-row"><span style="color:var(--amber-600)">'+luc('repeat',14)+'</span><span class="font-medium" style="color:var(--amber-700)">'+summary.countered.length+' counter-offered</span><span class="text-muted">\u2014 counter total: '+fmt(summary.countered.reduce(function(s,d){return s+(d.tenantResponse?d.tenantResponse.counterAmount:0)},0))+'</span></div>':'')+
        (summary.unresponded.length?'<div class="neg-summary-row"><span style="color:var(--zinc-400)">'+luc('clock',14)+'</span><span class="text-muted">'+summary.unresponded.length+' awaiting response</span></div>':'')+
      '</div></div></div>':'')+
    '<div class="card card-p mt-4"><h4 class="mb-3">Case Timeline</h4>'+
      '<div class="space-y-4">'+
        '<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:50%;background:var(--emerald-50);color:var(--emerald-600);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+luc('home',14)+'</div><div><div class="text-sm">Tenancy ended</div><div class="text-11 text-muted mt-1">'+cs.end+'</div></div></div>'+
        '<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:50%;background:var(--sky-50);color:var(--sky-700);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+luc('search',14)+'</div><div><div class="text-sm">Checkout inspection completed</div><div class="text-11 text-muted mt-1">Property inspected and documented</div></div></div>'+
        '<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:50%;background:var(--amber-50);color:var(--amber-700);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+luc('file-text',14)+'</div><div><div class="text-sm">Proposed deductions sent</div><div class="text-11 text-muted mt-1">Review the deductions and respond within 14 days</div></div></div>'+
        (Object.keys(responses).length>0?'<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:50%;background:var(--emerald-50);color:var(--emerald-600);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+luc('check',14)+'</div><div><div class="text-sm" style="color:var(--emerald-700)">You have responded to '+Object.keys(responses).length+' of '+activeDefects.length+' items</div><div class="text-11 text-muted mt-1">Your responses are saved and visible to the agent</div></div></div>':
        '<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:50%;background:var(--zinc-100);color:var(--zinc-400);display:flex;align-items:center;justify-content:center;flex-shrink:0">'+luc('clock',14)+'</div><div><div class="text-sm text-muted">Awaiting your response</div><div class="text-11 text-muted mt-1">You have 6 days remaining to respond</div></div></div>')+
      '</div>'+
    '</div>'+
    '<div class="card card-p mt-4"><h4 class="mb-3">Your Rights</h4>'+
      '<div class="space-y-4">'+
        '<div style="padding:10px 12px;background:var(--zinc-50);border-radius:var(--radius-sm)"><div class="text-sm font-medium">Review proposed deductions</div><div class="text-11 text-muted mt-1">You can view itemised deductions and supporting evidence</div></div>'+
        '<div style="padding:10px 12px;background:var(--zinc-50);border-radius:var(--radius-sm)"><div class="text-sm font-medium">Upload your own evidence</div><div class="text-11 text-muted mt-1">Submit move-in photos or documents that support your case</div></div>'+
        '<div style="padding:10px 12px;background:var(--zinc-50);border-radius:var(--radius-sm)"><div class="text-sm font-medium">Dispute individual charges</div><div class="text-11 text-muted mt-1">Challenge any item you disagree with — provide your reasoning</div></div>'+
        '<div style="padding:10px 12px;background:var(--zinc-50);border-radius:var(--radius-sm)"><div class="text-sm font-medium">Request formal adjudication</div><div class="text-11 text-muted mt-1">If no agreement is reached, the deposit scheme will decide</div></div>'+
      '</div>'+
    '</div>'
  }
  if(t==='deductions'){
    return'<div class="card card-p"><div class="flex-between mb-4"><h4>Proposed Deductions</h4><span class="text-sm text-muted">'+activeDefects.length+' items \u2022 '+fmt(totalClaim)+' total</span></div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:10px;background:var(--zinc-50);border-radius:var(--radius-sm)">'+luc('info',14)+'<span class="text-xs text-muted">Respond to each item individually: accept the charge, dispute it with a reason, or counter-offer a different amount. Your responses are saved automatically.</span></div>'+
      '<div class="space-y-4">'+
        activeDefects.map(function(d){
          var resp=responses[d.id]
          var currentStatus=resp?resp.status:null
          var cost=d.adjustedCost||d.estimatedCost

function handleTenantEvidenceUpload(files,caseId){
  if(!files||!files.length)return
  var loaded=0
  Array.from(files).forEach(function(file){
    var reader=new FileReader()
    reader.onload=function(e){
      addSharedEvidence(caseId,{name:file.name,type:file.type,size:file.size,dataUrl:e.target.result},'Tenant')
      loaded++
      if(loaded>=files.length){showToast(loaded+' file(s) uploaded','success');render()}
    }
    reader.readAsDataURL(file)
  })
}
function sendTenantPortalMsg(caseId){
  var input=document.getElementById('tenant-msg-input')
  if(!input||!input.value.trim()){if(input)input.style.borderColor='var(--rose-400)';showToast('Please enter a message','error');return}
  var cs=CASES.find(function(c){return c.id===caseId})
  WS_MESSAGES.push({from:cs?cs.tenant:'Tenant',role:'tenant',time:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),text:input.value.trim()})
  persistThreads()
  addNotification('New tenant message',(cs?cs.tenant:'Tenant')+' sent a message on '+caseId,'info')
  logSystemAudit('tenant_message','Tenant message on '+caseId)
  input.value=''
  render()
}

      '<div class="ws-msg-thread" style="padding:16px;max-height:400px">'+
        (WS_MESSAGES.length>0?WS_MESSAGES.map(function(m){

function handleLandlordEvidenceUpload(files,caseId){
  if(!files||!files.length)return
  var loaded=0
  Array.from(files).forEach(function(file){
    var reader=new FileReader()
    reader.onload=function(e){
      addSharedEvidence(caseId,{name:file.name,type:file.type,size:file.size,dataUrl:e.target.result},'Landlord')
      loaded++
      if(loaded>=files.length){showToast(loaded+' file(s) uploaded','success');render()}
    }
    reader.readAsDataURL(file)
  })
}
function sendLandlordPortalMsg(caseId){
  var input=document.getElementById('landlord-msg-input')
  if(!input||!input.value.trim()){if(input)input.style.borderColor='var(--rose-400)';showToast('Please enter a message','error');return}
  var cs=CASES.find(function(c){return c.id===caseId})
  WS_MESSAGES.push({from:cs?cs.landlord:'Landlord',role:'landlord',time:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),text:input.value.trim()})
  persistThreads()
  addNotification('New landlord message',(cs?cs.landlord:'Landlord')+' sent a message on '+caseId,'info')
  logSystemAudit('landlord_message','Landlord message on '+caseId)
  input.value=''
  render()
}

    ${state.mobileSidebarOpen?`<div class="mobile-overlay show" onclick="state.mobileSidebarOpen=false;render()"></div><div class="mobile-sidebar show">${renderSidebar(true)}</div>`:''}

  `
  // Init Lucide icons
  requestAnimationFrame(()=>{try{lucide.createIcons()}catch(e){}})
  // Init sparklines on dashboard
  if(state.page==='dashboard')initDashboardEnhancements()
  // Render donuts on workspace pages
  if(state.page==='workspace'){
    const cs=CASES.find(c=>c.id===state.activeCaseId)||CASES[0]
    const defects=state.wsDefects||WS_DEFECTS
    const totalClaim=defects.filter(d=>!d.excluded).reduce((s,d)=>s+(d.adjustedCost||d.estimatedCost),0)
    const claimPct=Math.round(totalClaim/cs.deposit*100)
    if(state.wsStep==='analysis'&&state.wsAnalysisDone){const active=defects.filter(d=>!d.excluded);const tAmt=active.filter(d=>(d.operatorLiability||d.aiLiability)==='tenant').reduce((s,d)=>s+(d.adjustedCost||d.estimatedCost),0);const sAmt=active.filter(d=>(d.operatorLiability||d.aiLiability)==='shared').reduce((s,d)=>s+(d.adjustedCost||d.estimatedCost),0);const lAmt=active.filter(d=>(d.operatorLiability||d.aiLiability)==='landlord').reduce((s,d)=>s+(d.adjustedCost||d.estimatedCost),0);const lt=tAmt+sAmt+lAmt||1;renderDonutChart('liability-donut',[{pct:Math.round(tAmt/lt*100),color:'#f43f5e'},{pct:Math.round(sAmt/lt*100),color:'#f59e0b'},{pct:Math.round(lAmt/lt*100),color:'#0ea5e9'}])}
    if(state.wsStep==='refund')renderDonutChart('refund-donut',[{pct:claimPct,color:'#10b981'},{pct:100-claimPct,color:'#0ea5e9'}])
    if(state.wsStep==='analysis'&&state.wsAnalysisDone){
      const reviewed=defects.filter(d=>d.reviewed).length
      const rpct=defects.length?Math.round(reviewed/defects.length*100):0
      renderDonutChart('review-progress-ring',[{pct:rpct,color:'#10b981'},{pct:100-rpct,color:'#e4e4e7'}],64)
      const tCnt=defects.filter(d=>(d.operatorLiability||d.aiLiability)==='tenant').length
      const sCnt=defects.filter(d=>(d.operatorLiability||d.aiLiability)==='shared').length
      const lCnt=defects.filter(d=>(d.operatorLiability||d.aiLiability)==='landlord').length
      const tot=defects.length||1
      renderDonutChart('review-liability-mini',[{pct:Math.round(tCnt/tot*100),color:'#f43f5e'},{pct:Math.round(sCnt/tot*100),color:'#f59e0b'},{pct:Math.round(lCnt/tot*100),color:'#0ea5e9'}],56)
    }
    if(state.wsStep==='negotiation'){
      const nps=getNegotiationSummary(state.activeCaseId)
      const active=defects.filter(d=>!d.excluded).length||1
      const responded=nps.accepted.length+nps.disputed.length+nps.countered.length
      const rpct=Math.round(responded/active*100)
      const dpct=Math.round((nps.disputed.length+nps.countered.length)/active*100)
      const apct=Math.round(nps.accepted.length/active*100)
      renderDonutChart('neg-response-ring',[{pct:apct,color:'#10b981'},{pct:dpct,color:'#f43f5e'},{pct:100-apct-dpct,color:'#e4e4e7'}],64)
    }
  }
  // Init chart bars
  initChartBars()
}

function initDashboardEnhancements(){
  // Sparklines
  renderSparkline('spark-tenancies',SPARKLINE_DATA.tenancies,'#10b981')
  renderSparkline('spark-cases',SPARKLINE_DATA.cases,'#0ea5e9')
  renderSparkline('spark-deposits',SPARKLINE_DATA.deposits,'#10b981')
  renderSparkline('spark-claims',SPARKLINE_DATA.claims,'#f59e0b')
  // Animated counters
  document.querySelectorAll('[data-counter]').forEach(el=>{
    const target=parseInt(el.getAttribute('data-counter'))
    const prefix=el.getAttribute('data-prefix')||''
    animateCounter(el,target,prefix)
  })
}

function renderSparkline(id,data,color){
  const el=document.getElementById(id);if(!el)return
  const w=64,h=24,pad=2
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1
  const pts=data.map((v,i)=>{
    const x=pad+(i/(data.length-1))*(w-2*pad)
    const y=h-pad-((v-min)/range)*(h-2*pad)
    return`${x},${y}`
  }).join(' ')
  el.innerHTML=`<svg width="${w}" height="${h}" class="sparkline"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
}

function animateCounter(el,target,prefix=''){
  const duration=1200;const start=performance.now()
  const isCurrency=prefix==='\u00a3'
  function tick(now){
    const elapsed=now-start
    const progress=Math.min(elapsed/duration,1)
    const eased=1-Math.pow(1-progress,3)
    const current=Math.round(target*eased)
    el.textContent=isCurrency?'\u00a3'+current.toLocaleString('en-GB'):current.toString()
    if(progress<1)requestAnimationFrame(tick)
  }
  requestAnimationFrame(tick)
}

function initChartBars(){
  document.querySelectorAll('[data-bar-height]').forEach((el,i)=>{
    const h=el.getAttribute('data-bar-height')
    setTimeout(()=>{el.style.opacity='1';el.style.height=h+'%'},i*80)
  })
}

function runAnalysis(){
  state.wsAnalysisRunning=true;state.wsAnalysisStage=0;render()
  const advance=()=>{
    state.wsAnalysisStage++
    if(state.wsAnalysisStage<4){render();setTimeout(advance,1200)}
    else{state.wsAnalysisRunning=false;state.wsAnalysisDone=true;state.wsDefects=JSON.parse(JSON.stringify(WS_DEFECTS));const dCount=state.wsDefects.length;addNotification('Analysis complete','AI analysis finished for '+state.activeCaseId+' \u2014 '+dCount+' defect'+(dCount!==1?'s':'')+' identified','info');showToast('AI analysis complete \u2014 '+dCount+' defect'+(dCount!==1?'s':'')+' identified','success');saveWorkspaceState(state.activeCaseId);render()}
  }
  setTimeout(advance,1200)
}
function renderDonutChart(id,segments,size=100){
  const el=document.getElementById(id);if(!el)return
  const r=35,c=2*Math.PI*r;let off=0
  const paths=segments.map(s=>{const len=s.pct/100*c;const p=`<circle cx="50" cy="50" r="${r}" fill="none" stroke="${s.color}" stroke-width="10" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/>`; off+=len;return p}).join('')
  el.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="transform:rotate(-90deg)">${paths}</svg>`
}

// Keyboard nav for review step (now part of analysis step)
document.addEventListener('keydown',function(e){
  if(state.page!=='workspace'||!(state.wsStep==='analysis'&&state.wsAnalysisDone))return
  // Don't intercept when typing in inputs, textareas, or selects
  var tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||e.target.isContentEditable)return
  const defects=state.wsDefects||WS_DEFECTS
  const idx=defects.findIndex(d=>d.id===state.wsSelectedDefect)
  if(e.key==='ArrowDown'||e.key==='j'){e.preventDefault();if(idx<defects.length-1){state.wsSelectedDefect=defects[idx+1].id;render();setTimeout(function(){var el=document.querySelector('.ws-defect-card.selected');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'})},50)}}
  if(e.key==='ArrowUp'||e.key==='k'){e.preventDefault();if(idx>0){state.wsSelectedDefect=defects[idx-1].id;render();setTimeout(function(){var el=document.querySelector('.ws-defect-card.selected');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'})},50)}}
  if(e.key==='t'){const d=defects.find(x=>x.id===state.wsSelectedDefect);if(d){var prev=d.operatorLiability||d.aiLiability;if(prev!=='tenant')logAudit(d.id,'liability',prev,'tenant');d.operatorLiability='tenant';d.reviewed=true;render()}}
  if(e.key==='l'){const d=defects.find(x=>x.id===state.wsSelectedDefect);if(d){var prev=d.operatorLiability||d.aiLiability;if(prev!=='landlord')logAudit(d.id,'liability',prev,'landlord');d.operatorLiability='landlord';d.reviewed=true;render()}}
  if(e.key==='s'&&!e.metaKey&&!e.ctrlKey){const d=defects.find(x=>x.id===state.wsSelectedDefect);if(d){var prev=d.operatorLiability||d.aiLiability;if(prev!=='shared')logAudit(d.id,'liability',prev,'shared');d.operatorLiability='shared';d.reviewed=true;render()}}
})

function handleDrop(e,newStatus){
  e.preventDefault()
  if(state.draggedCaseId){
    const c=CASES.find(c=>c.id===state.draggedCaseId)
    if(c){
      const oldIdx=WORKFLOW_STEPS.indexOf(c.status)
      const newIdx=WORKFLOW_STEPS.indexOf(newStatus)
      if(newIdx<oldIdx&&newStatus!=='disputed'){
        showToast('Cannot move '+c.id+' backwards from '+STATUS_META[c.status].label+' to '+STATUS_META[newStatus].label,'error')
      }else if(newIdx>oldIdx+1&&newStatus!=='disputed'&&newStatus!=='resolved'){
        showToast('Cannot skip stages \u2014 move '+c.id+' one step at a time','error')
      }else{
        const prev=c.status;c.status=newStatus;persistCases()
        logSystemAudit('status_change',c.id+' moved from '+STATUS_META[prev].label+' to '+STATUS_META[newStatus].label)
        addNotification('Case moved',c.id+' moved to '+STATUS_META[newStatus].label,'info')
        showToast(c.id+' moved to '+STATUS_META[newStatus].label,'success')
      }
    }
  }
  state.draggedCaseId=null;state.dragOverColumn=null;render()
}
