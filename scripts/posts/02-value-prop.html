<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Renovo AI — AI drafts. Managers decide.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_shared.css" />
  <style>
    .eyebrow { margin-bottom: 44px; }
    .beats {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .beat {
      display: flex;
      align-items: baseline;
      gap: 28px;
    }
    .beat-num {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 64px;
      line-height: 1;
      color: #10b981;
      min-width: 70px;
    }
    .beat-text {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1;
      color: #ffffff;
    }
    .beat-text em {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #10b981;
    }
    .sub {
      margin-top: 56px;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: rgba(226,232,240,0.78);
      max-width: 840px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="post-head">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="14" y="24" width="80" height="18" rx="9" fill="#ffffff" opacity="0.65" />
          <rect x="24" y="55" width="80" height="18" rx="9" fill="#ffffff" opacity="0.9" />
          <rect x="34" y="86" width="80" height="18" rx="9" fill="#10b981" />
        </svg>
        <span class="brand-name">Renovo AI</span>
      </div>
      <div class="url"><span class="arrow">&rarr;</span>renovoai.co.uk</div>
    </div>

    <div class="post-body">
      <div class="eyebrow">
        <span class="pulse"></span>
        How Renovo works
      </div>

      <div class="beats">
        <div class="beat"><span class="beat-num">01</span><span class="beat-text">AI drafts.</span></div>
        <div class="beat"><span class="beat-num">02</span><span class="beat-text">Managers decide.</span></div>
        <div class="beat"><span class="beat-num">03</span><span class="beat-text">Audit <em>ready.</em></span></div>
      </div>

      <p class="sub">Every deduction ships with evidence, reasoning, and a precedent citation — scheme-ready on day one.</p>
    </div>

    <div class="post-foot">
      <span class="foot-label">Renovo AI &middot; End of tenancy automation</span>
      <span class="foot-schemes">SafeDeposits<span class="dot"></span>DPS<span class="dot"></span>TDS<span class="dot"></span>mydeposits</span>
    </div>
  </div>
</body>
</html>
