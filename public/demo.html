function renderSidebar(mobile = false) {
  const c = state.sidebarCollapsed && !mobile
  const p = state.page

  const navGroups = [
    { label: 'Operations', items: [
      { label: 'Checkouts', page: 'checkouts', icon: 'checkouts', active: p === 'checkouts' || p === 'workspace' },
      { label: 'Disputes', page: 'disputes', icon: 'disputes', active: p === 'disputes' },
      { label: 'Inventory feedback', page: 'feedback', icon: 'feedback', active: p === 'feedback' },
      { label: 'Deposit Scheme', page: 'deposit-scheme', icon: 'deposit-scheme', active: p === 'deposit-scheme' },
      { label: 'Guidance', page: 'guidance', icon: 'guidance', active: p === 'guidance' },
    ]},
    { label: 'Management', items: [
      { label: 'Admin', page: 'admin', icon: 'admin', active: p === 'admin' },
      { label: 'Teams', page: 'teams', icon: 'teams', active: p === 'teams' },
      { label: 'Reports / Analytics', page: 'reports', icon: 'reports', active: p === 'reports' },
    ]},
    { label: 'Account', items: [
      { label: 'Settings', page: 'settings', icon: 'settings', active: p === 'settings' },
    ]},
  ]

  return `
    <div class="flex h-full flex-col">
      <div class="flex items-center ${c ? 'justify-center' : 'justify-between'}">
        <a onclick="navigate('checkouts')" class="flex items-center gap-3 px-3 py-3 cursor-pointer">
          ${c ? `<div class="flex h-7 w-7 items-center justify-center rounded-md bg-emerald-600 text-white text-xs font-bold">R</div>` : `
            <div>
              <div class="flex items-center gap-2">
                <div class="flex h-6 w-6 items-center justify-center rounded-md bg-emerald-600 text-white text-[10px] font-bold">R</div>
                <span class="text-sm font-semibold tracking-[-0.02em] text-zinc-950">Renovo AI</span>
              </div>
              <p class="mt-1 pl-8 text-[13px] font-medium tracking-[-0.01em] text-zinc-500">End of Tenancy</p>
            </div>
          `}
        </a>
        ${!mobile ? `<button onclick="state.sidebarCollapsed=!state.sidebarCollapsed;render()" class="hidden xl:flex h-8 w-8 items-center justify-center rounded-md text-zinc-600 transition hover:bg-zinc-100 hover:text-zinc-950">
          <svg class="h-4 w-4 transition ${c ? 'rotate-180' : ''}" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">${svgIcon('chevronLeft').match(/<svg[^>]*>(.*)<\/svg>/)[1]}</svg>
        </button>` : ''}
      </div>
      <div class="mt-8 space-y-6 pb-6">
        ${navGroups.map(group => `
          <div>
            ${!c ? `<p class="px-3 text-[11px] font-semibold uppercase tracking-[0.08em] text-emerald-600/70">${group.label}</p>` : ''}
            <div class="space-y-0.5 ${!c ? 'mt-3' : ''}">
              ${group.items.map(item => `
                <a onclick="navigate('${item.page}')" class="group relative flex items-center gap-3 rounded-lg border px-3 py-2.5 text-sm font-medium transition cursor-pointer
                  ${item.active ? 'border-zinc-200 bg-white text-zinc-950 shadow-[0_2px_8px_rgba(0,0,0,0.04)]' : 'border-transparent text-zinc-600 hover:border-zinc-200 hover:bg-white hover:text-zinc-950'}
                  ${c ? 'justify-center px-2' : ''}">
                  ${item.active ? '<span class="absolute left-0 top-1/2 h-5 w-[3px] -translate-y-1/2 rounded-r-full bg-emerald-500"></span>' : ''}
                  <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md transition ${item.active ? 'bg-emerald-50 text-emerald-600' : 'text-zinc-400 group-hover:text-zinc-600'}">
                    ${svgIcon(item.icon)}
                  </span>
                  ${!c ? `<span class="truncate">${item.label}</span>` : ''}
                </a>
              `).join('')}
              ${group.label === 'Account' ? `
                <button onclick="alert('Demo sign out — in the real app this ends your session.')" class="group flex w-full items-center gap-3 rounded-lg border border-transparent px-3 py-2.5 text-sm font-medium text-zinc-600 transition hover:border-zinc-200 hover:bg-white hover:text-zinc-950 ${c ? 'justify-center px-2' : ''}">
                  <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md text-zinc-400 transition group-hover:text-zinc-600">${svgIcon('signout')}</span>
                  ${!c ? '<span class="truncate">Sign out</span>' : ''}
                </button>
              ` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`
}

    admin: { title: 'Admin', breadcrumbs: [{label:'Management'},{label:'Admin'}] },
    teams: { title: 'Teams', breadcrumbs: [{label:'Management'},{label:'Teams'}] },
    reports: { title: 'Reports / Analytics', breadcrumbs: [{label:'Management'},{label:'Reports / Analytics'}] },
    settings: { title: 'Settings', breadcrumbs: [{label:'Account'},{label:'Settings'}] },
  }
  return configs[state.page] || configs.checkouts
}

function renderWorkspacePage() {
  const cs = getCase()
  const s = state.workspaceStatus
  const sm = STATUS_META[s]
  const stepIdx = WORKFLOW_STEPS.indexOf(s)

  // Progress bar
  const progressBar = `
    <div class="border border-zinc-200/80 bg-white px-5 py-3">
      <div class="flex items-center gap-0">
        ${WORKFLOW_STEPS.map((ws, i) => {
          const wsm = STATUS_META[ws]
          const isCurrent = ws === s
          const isComplete = WORKFLOW_STEPS.indexOf(ws) < stepIdx
          const connector = i > 0 ? `<div class="h-px w-5 ${isComplete ? 'bg-emerald-300' : 'bg-zinc-200'}"></div>` : ''
          return `${connector}<button onclick="handleStepClick('${ws}')" class="flex items-center gap-1.5 px-2 py-1 text-[11px] font-medium transition cursor-pointer hover:text-zinc-700 ${isCurrent ? 'text-zinc-950' : isComplete ? 'text-emerald-600' : 'text-zinc-400'}">
            ${isComplete ? `<svg class="h-3.5 w-3.5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>` :
              isCurrent ? `<div class="h-2 w-2 rounded-full ${s === 'analysis' ? 'bg-amber-500 anim-pulse' : 'bg-zinc-900'}"></div>` :
              '<div class="h-1.5 w-1.5 rounded-full bg-zinc-300"></div>'}
            ${wsm.label}
          </button>`
        }).join('')}
        ${s === 'disputed' ? `<div class="h-px w-5 bg-zinc-200"></div><div class="flex items-center gap-1.5 px-2 py-1 text-[11px] font-medium text-rose-700"><div class="h-2 w-2 rounded-full bg-rose-500"></div>Disputed</div>` : ''}
      </div>
    </div>`

  return `
    <div class="fade-in space-y-4">
      <!-- Case header -->
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-base font-semibold tracking-[-0.02em] text-zinc-950">${cs.property}</h2>
          <p class="mt-1 flex items-center gap-4 text-sm text-zinc-500">
            <span>${cs.tenant}</span>
            <span class="text-zinc-200">|</span>
            <span>${cs.landlord}</span>
            <span class="text-zinc-200">|</span>
            <span>Deposit ${fmt(cs.deposit)}</span>
          </p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="navigate('checkouts')" class="inline-flex items-center gap-1.5 px-2.5 py-1.5 text-xs font-medium text-zinc-600 transition hover:text-zinc-950">
            ${svgIcon('arrowLeft')} Checkouts
          </button>
          ${badge(sm.label, sm.badgeCls)}
        </div>
      </div>

      ${progressBar}

      <!-- Step content -->
      <div class="border border-zinc-200/80 bg-white">
        <div class="px-6 py-6">${renderWorkspaceStep()}</div>
      </div>

      <!-- Activity log -->
      <div class="border border-zinc-200/80 bg-white px-6 py-5">
        <h4 class="text-xs font-semibold uppercase tracking-[0.08em] text-zinc-400">Activity log</h4>
        <div class="mt-3 space-y-2">
          ${state.workspaceLog.slice(0, 6).map(l => `<p class="text-xs text-zinc-500">${l}</p>`).join('')}
        </div>

    </div>`
}

            <button onclick="handleReset()" class="border border-zinc-200 bg-white px-4 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-50 transition">Restart demo</button>

          <p class="mt-2 text-2xl font-semibold text-emerald-700">${fmt(totalClaim())}</p>
        </div>

}

function renderIssuesTable() {

  const decBadge = d => d === 'charge' ? 'border-emerald-200 bg-emerald-50 text-emerald-700' : d === 'partial' ? 'border-amber-200 bg-amber-50 text-amber-700' : 'border-zinc-200 bg-zinc-100 text-zinc-700'
  return `

        </div>
      </div>

      <!-- Status distribution -->
      <div class="border border-zinc-200/80 bg-white px-6 py-5">
        <h3 class="text-sm font-semibold text-zinc-950">Status distribution</h3>
        <div class="mt-4 space-y-2.5">

                  <td class="px-3 py-2.5 text-sm font-medium text-zinc-950">${c.property}</td>

          <div class="flex items-center justify-between border-b border-zinc-100 py-3">
            <div><p class="text-sm text-zinc-700">Email provider</p></div>
            <p class="text-sm font-medium text-zinc-950">Resend</p>
          </div>
          <div class="flex items-center justify-between border-b border-zinc-100 py-3">
            <div><p class="text-sm text-zinc-700">Sending domain</p></div>
            <p class="text-sm font-medium text-emerald-700">Verified</p>
          </div>
          <div class="flex items-center justify-between py-3">
            <div><p class="text-sm text-zinc-700">Reply-to address</p></div>
            <p class="text-sm font-medium text-zinc-950">support@propertyfirst.co.uk</p>
          </div>
        </div>
      </section>
    </div>`
}

// ═══════════════════════════════════════════════════════════════
// WORKFLOW ACTIONS
// ═══════════════════════════════════════════════════════════════

function handleUpload() {
  state.workspaceDocuments = ['Check-in report', 'Check-out report', 'Evidence photos (12)']
  state.workspaceStatus = 'collecting_evidence'
  addLog('Documents uploaded: check-in report, check-out report, 12 evidence photos')
  render()
}

async function handleAnalyse() {
  state.workspaceStatus = 'analysis'
  addLog('AI analysis started')
  render()
  await new Promise(r => setTimeout(r, 800))
  addLog('Extracting check-in report text')
  render()
  await new Promise(r => setTimeout(r, 700))
  addLog('Extracting check-out report text')
  render()
  await new Promise(r => setTimeout(r, 900))
  addLog('Comparing property condition')
  render()
  await new Promise(r => setTimeout(r, 500))
  state.workspaceIssues = MOCK_ISSUES
  state.workspaceStatus = 'review'
  addLog('Analysis complete: 4 issues identified, ' + fmt(totalClaim()) + ' claim position')
  render()
}

function handleApprove() {
  const cs = getCase()
  state.workspaceStatus = 'draft_sent'
  addLog('Draft sent to ' + cs.landlord + ' and ' + cs.tenant)
  render()
}

function handleConfirmDraft() {
  state.workspaceStatus = 'ready_for_claim'
  addLog('Both parties reviewed — proceeding to claim')
  render()
}

function handleSubmit() {
  const cs = getCase()
  state.workspaceStatus = 'submitted'
  addLog('Claim of ' + fmt(totalClaim()) + ' submitted to ' + cs.scheme)
  render()
}

function handleDispute() {
  state.workspaceStatus = 'disputed'
  addLog('Tenant disputed the claim')
  render()
}

function handleResolve() {
  state.workspaceStatus = 'resolved'
  addLog('Case resolved')
  render()
}

function handleReset() {
  state.workspaceStatus = 'draft'
  state.workspaceDocuments = []
  state.workspaceIssues = []
  state.workspaceLog = ['Case created — awaiting documents']
  render()
}

function handleStepClick(step) {
  // Only allow clicking completed or current steps
  const currentIdx = WORKFLOW_STEPS.indexOf(state.workspaceStatus)
  const targetIdx = WORKFLOW_STEPS.indexOf(step)
  if (targetIdx <= currentIdx) {
    // For completed steps, just show them (don't reset state)
    // But we need issues populated for review+ steps
    if (targetIdx >= 3 && state.workspaceIssues.length === 0) {
      state.workspaceIssues = MOCK_ISSUES
    }
    if (targetIdx >= 1 && state.workspaceDocuments.length === 0) {
      state.workspaceDocuments = ['Check-in report', 'Check-out report', 'Evidence photos (12)']
    }
    state.workspaceStatus = step
    render()
  }
}
