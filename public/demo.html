            ${ps.accepted.length?'<div class="ws-neg-response-row"><span style="color:var(--emerald-600)">'+luc('check-circle',14)+'</span><span class="text-sm">Accepted '+ps.accepted.length+' item'+(ps.accepted.length!==1?'s':'')+'</span><span class="text-sm font-semibold tabnum" style="margin-left:auto;color:var(--emerald-600)">'+fmt(agreedAmt)+'</span></div>':''}
            ${ps.disputed.length?'<div class="ws-neg-response-row"><span style="color:var(--rose-600)">'+luc('x-circle',14)+'</span><span class="text-sm">Disputed '+ps.disputed.length+' item'+(ps.disputed.length!==1?'s':'')+'</span><span class="text-sm font-semibold tabnum" style="margin-left:auto;color:var(--rose-600)">'+fmt(disputedAmt)+'</span></div>':''}
            ${ps.countered.length?'<div class="ws-neg-response-row"><span style="color:var(--amber-600)">'+luc('repeat',14)+'</span><span class="text-sm">Counter-offered '+ps.countered.length+' item'+(ps.countered.length!==1?'s':'')+'</span><span class="text-sm font-semibold tabnum" style="margin-left:auto;color:var(--amber-600)">'+fmt(counteredAmt)+'</span></div>':''}
          </div>`:
          `<div style="padding:16px;text-align:center;background:var(--zinc-50);border-radius:var(--radius-sm)">
            <div style="color:var(--zinc-300)">${luc('users',20)}</div>
            <div class="text-sm text-muted mt-2">No portal responses yet</div>
            <div class="text-11 text-muted mt-1">Responses will appear here once tenant or landlord reply via their portal</div>
          </div>`}
          ${(ps.approved.length+ps.queried.length+ps.rejected.length)>0?`
          <div class="ws-neg-response-panel mt-2">
            <div class="text-11 font-semibold mb-2" style="color:var(--zinc-500)">Landlord</div>
            ${ps.approved.length?'<div class="ws-neg-response-row"><span style="color:var(--emerald-600)">'+luc('check-circle',14)+'</span><span class="text-sm">Approved '+ps.approved.length+' item'+(ps.approved.length!==1?'s':'')+'</span></div>':''}
            ${ps.queried.length?'<div class="ws-neg-response-row"><span style="color:var(--amber-600)">'+luc('help-circle',14)+'</span><span class="text-sm">Queried '+ps.queried.length+' item'+(ps.queried.length!==1?'s':'')+'</span></div>':''}
            ${ps.rejected.length?'<div class="ws-neg-response-row"><span style="color:var(--rose-600)">'+luc('x-circle',14)+'</span><span class="text-sm">Rejected '+ps.rejected.length+' item'+(ps.rejected.length!==1?'s':'')+'</span></div>':''}
          </div>`:''}
        </div>

        <!-- Operator Notes -->
        <div class="ws-detail-section">
          <div class="ws-section-header"><span style="color:var(--zinc-400)">${luc('pencil',14)}</span><span class="kicker" style="margin:0">Operator Notes</span></div>
          <textarea class="form-input" style="width:100%;height:70px;resize:vertical;padding:10px" placeholder="Internal negotiation notes..." oninput="state.wsNegNotes=this.value">${state.wsNegNotes}</textarea>
        </div>
      </div>

      <!-- Message Thread -->
      <div class="card card-p">
        <div class="flex-between mb-3">
          <div class="ws-section-header" style="margin:0"><span style="color:var(--zinc-400)">${luc('message-square',14)}</span><h3 style="margin:0">Message Thread</h3></div>
          <span class="text-11 text-muted">${WS_MESSAGES.length} messages</span>
        </div>
        <div class="ws-msg-thread" style="max-height:320px;gap:12px">${negMsgs}</div>
        <!-- Quick replies -->
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--zinc-100)">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <span class="text-11 text-muted">Quick replies:</span>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              ${quickReplies.map(function(qr){return'<button class="ws-neg-quick-reply" onclick="state.wsReplyText=\''+qr.text.replace(/'/g,"\\'")+'\';render();var el=document.getElementById(\'neg-reply-input\');if(el)el.focus()">'+qr.label+'</button>'}).join('')}
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <input type="text" class="form-input" style="flex:1;height:36px" placeholder="Type a reply..." value="${state.wsReplyText}" oninput="state.wsReplyText=this.value" onkeydown="if(event.key==='Enter')sendWsReply()" id="neg-reply-input">
            <button class="btn btn-accent btn-sm" onclick="sendWsReply()">${luc('send',14)}</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Item-by-item negotiation table -->
    <div class="card card-p">
      <div class="flex-between mb-3">
        <div class="ws-section-header" style="margin:0"><span style="color:var(--zinc-400)">${luc('list',14)}</span><h4 style="margin:0">Deduction Items</h4></div>
        <span class="text-11 text-muted">Click to expand details</span>
      </div>
      <div class="space-y-4" style="gap:6px;display:flex;flex-direction:column">${negItemRows}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;padding:12px;background:var(--zinc-50);border-radius:var(--radius-sm)">
        <div><span class="text-11 text-muted">Proposed</span><div class="text-sm font-bold tabnum">${fmt(totalClaim)}</div></div>
        <div><span class="text-11 text-muted">Agreed</span><div class="text-sm font-bold tabnum" style="color:var(--emerald-600)">${fmt(agreedAmt)}</div></div>
        <div><span class="text-11 text-muted">In Dispute</span><div class="text-sm font-bold tabnum" style="color:var(--rose-600)">${fmt(disputedAmt+counteredAmt)}</div></div>
      </div>
    </div>

    <!-- Escalation workflow (shows when disputed or overdue) -->
    ${state.wsNegStatus==='disputed'||(state.wsDraftSentDate&&(function(){var s=new Date(state.wsDraftSentDate);return Math.ceil((new Date(s.getTime()+14*24*60*60*1000)-new Date())/(1000*60*60*24))<0})())?`
    <div class="ws-neg-escalation">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        ${luc('alert-triangle',16)}
        <h4 style="margin:0;color:var(--rose-700)">Resolution Required</h4>
        ${state.wsNegStatus==='disputed'?badge('Disputed','badge-rose'):''}
      </div>
      <p class="text-sm text-muted mb-3">The parties have not reached agreement. Choose a path forward:</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="ws-neg-escalation-option" onclick="escalateRevisedOffer()">
          <div class="stat-icon" style="background:var(--amber-100);color:var(--amber-600);width:32px;height:32px">${luc('pencil',14)}</div>
          <div><div class="text-sm font-medium">Propose Revised Offer</div><div class="text-11 text-muted mt-1">Adjust disputed items and send an updated settlement proposal</div></div>
        </div>
        <div class="ws-neg-escalation-option" onclick="escalateAdjudication()">
          <div class="stat-icon" style="background:var(--rose-100);color:var(--rose-600);width:32px;height:32px">${luc('scale',14)}</div>
          <div><div class="text-sm font-medium">Escalate to Adjudication</div><div class="text-11 text-muted mt-1">Submit the case to ${cs.scheme} for independent adjudication</div></div>
        </div>
        <div class="ws-neg-escalation-option" onclick="escalateMediation()">
          <div class="stat-icon" style="background:var(--sky-100);color:var(--sky-600);width:32px;height:32px">${luc('users',14)}</div>
          <div><div class="text-sm font-medium">Request Mediation</div><div class="text-11 text-muted mt-1">Invite a neutral third party to help broker agreement</div></div>
        </div>
      </div>
    </div>`:''}

    <!-- Agreed banner -->
    ${state.wsNegStatus==='agreed'?`
    <div style="padding:16px;background:var(--emerald-50);border:1px solid var(--emerald-200);border-radius:var(--radius-md);display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--emerald-100);color:var(--emerald-600);display:flex;align-items:center;justify-content:center">${luc('check-circle',20)}</div>
      <div><div class="font-semibold" style="color:var(--emerald-700)">Agreement Reached</div><div class="text-sm text-muted mt-1">Both parties have agreed on the deductions. You can now proceed to process the deposit return.</div></div>
    </div>`:''}

    <!-- Navigation -->
    <div class="mt-3" style="display:flex;justify-content:space-between">
      <button class="btn btn-secondary" onclick="goToStep('deductions')">${luc('arrow-left',14)} Back</button>
      <button class="btn btn-accent" onclick="goToStep('refund')">Continue to Refund ${luc('arrow-right',14)}</button>
    </div>`}

  // ── REFUND ──
  if(s==='refund'){
    const claimPct=Math.round(totalClaim/cs.deposit*100)
    const returnPct=100-claimPct
    return`
    ${state.wsResolved?`<div class="card card-p" style="text-align:center;padding:48px;border:2px solid var(--emerald-200);background:var(--emerald-50)">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--emerald-100);color:var(--emerald-600);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px">${luc('check-circle',28)}</div>
      <h2 style="color:var(--emerald-700)">Case Resolved</h2>
      <p class="text-muted mt-2">Deposit processed and returned. Case closed on 12 Apr 2026.</p>
      <button class="btn btn-accent mt-4" onclick="state.showFinalStatement=true;render()">${luc('file-text',14)} View Final Claim Statement</button>
      <div style="display:flex;align-items:center;justify-content:center;gap:32px;margin-top:24px">
        <div id="refund-donut"></div>
        <div style="text-align:left" class="space-y-4">
          <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:var(--emerald-500)"></div><div><div class="kicker">To Landlord</div><div class="text-sm font-bold">${fmt(totalClaim)} (${claimPct}%)</div></div></div>
          <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:var(--sky-500)"></div><div><div class="kicker">To Tenant</div><div class="text-sm font-bold">${fmt(cs.deposit-totalClaim)} (${returnPct}%)</div></div></div>
          <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:var(--zinc-300)"></div><div><div class="kicker">Total Deposit</div><div class="text-sm font-bold">${fmt(cs.deposit)}</div></div></div>
        </div>
      </div>
    </div>`:`
    <div class="grid-4">
      <div class="stat-card"><div class="stat-label">Total Claimed</div><div class="stat-value tabnum" style="color:var(--emerald-600)">${fmt(totalClaim)}</div></div>
      <div class="stat-card"><div class="stat-label">Deposit Held</div><div class="stat-value tabnum">${fmt(cs.deposit)}</div></div>
      <div class="stat-card"><div class="stat-label">Return to Tenant</div><div class="stat-value tabnum">${fmt(cs.deposit-totalClaim)}</div></div>
      <div class="stat-card"><div class="stat-label">Return to Landlord</div><div class="stat-value tabnum">${fmt(totalClaim)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card card-p"><div class="flex-between mb-3"><h3>Deposit Breakdown</h3></div>
        <div style="display:flex;align-items:center;gap:20px">
          <div id="refund-donut"></div>
          <div class="space-y-4" style="flex:1">
            <div><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:var(--emerald-500)"></div><span class="kicker" style="margin:0">To Landlord</span></div><div class="text-sm font-bold mt-1">${fmt(totalClaim)} <span class="text-muted font-normal">(${claimPct}%)</span></div></div>
            <div><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:var(--sky-500)"></div><span class="kicker" style="margin:0">To Tenant</span></div><div class="text-sm font-bold mt-1">${fmt(cs.deposit-totalClaim)} <span class="text-muted font-normal">(${returnPct}%)</span></div></div>
          </div>
        </div>
      </div>
      <div class="card card-p"><div class="flex-between mb-3"><h3>Scheme Submission</h3></div>
        <div style="padding:14px;border:1px solid ${state.wsSchemeSubmitted?'var(--emerald-200)':'var(--zinc-200)'};border-radius:var(--radius-sm);background:${state.wsSchemeSubmitted?'var(--emerald-50)':'var(--zinc-50)'}">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="color:${state.wsSchemeSubmitted?'var(--emerald-600)':'var(--zinc-400)'}">${luc(state.wsSchemeSubmitted?'check-circle':'landmark',18)}</span>
            <div style="flex:1"><div class="text-sm font-medium">${cs.scheme}</div><div class="text-11 text-muted">${cs.ref}</div></div>
            ${state.wsSchemeSubmitted?badge('Submitted','badge-emerald'):badge('Pending','badge-zinc')}
          </div>
        </div>
        ${!state.wsSchemeSubmitted?`<button class="btn btn-accent btn-sm mt-3" onclick="state.wsSchemeSubmitted=true;showToast('Submitted to ${cs.scheme}','success');render()">${luc('send',14)} Submit</button>`:`<div class="mt-3" style="display:flex;gap:6px"><button class="btn btn-secondary btn-sm">${luc('upload',14)} Evidence</button><button class="btn btn-secondary btn-sm" onclick="showToast('Status: pending decision','default')">${luc('refresh-ccw',14)} Check</button></div>`}
      </div>
    </div>`}
    ${renderAdjudicationOutcome(cs,defects,totalClaim)}
    ${state.wsSchemeSubmitted&&!state.wsResolved&&!state.wsAdjOutcome?`<div class="card card-p"><div class="flex-between mb-3"><h3>Adjudication Outcome</h3>${badge('Awaiting','badge-amber')}</div>
      <div style="padding:20px;text-align:center;color:var(--zinc-400)">${luc('clock',20)}<div class="text-sm mt-2">No adjudication outcome received yet</div>
      <div class="text-11 text-muted mt-1">The decision will appear here once ${cs.scheme} has completed their review.</div>
      <button class="btn btn-secondary btn-sm mt-3" onclick="showToast('Checking ${cs.scheme} for updates\u2026','default')">${luc('refresh-ccw',14)} Check for Update</button></div>
    </div>`:''}
    <div class="card card-p"><div class="flex-between mb-3"><h3>Case Timeline</h3>
      <div class="ws-timeline-filter">${['all','accent','warning','default'].map(f=>`<button class="pill ${state.wsTimelineFilter===f?'active':''}" style="font-size:10px;padding:3px 8px" onclick="state.wsTimelineFilter='${f}';render()">${f==='all'?'All':f==='accent'?'Key':f==='warning'?'Alerts':'Activity'}</button>`).join('')}</div>
    </div>
      <div class="ws-timeline ws-timeline-enhanced">
        ${WS_TIMELINE.filter(t=>state.wsTimelineFilter==='all'||t.tone===state.wsTimelineFilter).map(t=>`<div class="ws-timeline-item ${t.tone}">
          <div style="display:flex;align-items:center;gap:8px"><span style="color:${t.tone==='accent'?'var(--emerald-600)':t.tone==='warning'?'var(--amber-600)':'var(--zinc-500)'}">${luc(t.icon,14)}</span><div class="text-sm">${t.event}</div></div>
          <div class="text-11 text-muted mt-1">${t.time}</div>
        </div>`).join('')}
      </div>
    </div>
    ${!state.wsResolved?`<div class="mt-2" style="display:flex;justify-content:space-between">
      <button class="btn btn-secondary" onclick="goToStep('deductions')">${luc('arrow-left',14)} Back</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="state.showFinalStatement=true;render()">${luc('file-text',14)} View Statement</button>
        <button class="btn btn-danger btn-sm" onclick="markCaseDisputed()">Mark Disputed</button>
        <button class="btn btn-accent" onclick="markCaseResolved()">${luc('check-circle',14)} Mark Resolved</button>
      </div>
    </div>`:''}`}
  return''
}

// ── REVIEW STEP (full-width split panel) ──
function wsStepReview(cs,defects,totalClaim){
  const filters=['all','tenant','landlord','shared']
  let filtered=state.wsDefectFilter==='all'?defects:defects.filter(d=>(d.operatorLiability||d.aiLiability)===state.wsDefectFilter)
  if(state.wsTradeFilter!=='all')filtered=filtered.filter(d=>d.type===state.wsTradeFilter)
  const sel=defects.find(d=>d.id===state.wsSelectedDefect)||filtered[0]
  const reviewed=defects.filter(d=>d.reviewed).length
  const pct=defects.length?Math.round(reviewed/defects.length*100):0
  const excludedCount=defects.filter(d=>d.excluded).length
  const excludedAmt=defects.filter(d=>d.excluded).reduce((s,d)=>s+(d.adjustedCost||d.estimatedCost),0)
  const tenantCnt=defects.filter(d=>(d.operatorLiability||d.aiLiability)==='tenant').length
  const landlordCnt=defects.filter(d=>(d.operatorLiability||d.aiLiability)==='landlord').length
  const sharedCnt=defects.filter(d=>(d.operatorLiability||d.aiLiability)==='shared').length
  const claimable=defects.filter(d=>!d.excluded&&(d.operatorLiability||d.aiLiability)==='tenant')
  const costs=claimable.length>0?claimable.map(d=>d.adjustedCost||d.estimatedCost):[0]
  const minCost=Math.min(...costs), maxCost=Math.max(...costs)
  const goodEv=defects.filter(d=>d.evidenceQuality==='good').length
  const fairEv=defects.filter(d=>d.evidenceQuality==='fair').length
  const poorEv=defects.filter(d=>d.evidenceQuality==='poor').length
  const highCnt=defects.filter(d=>d.severity==='high').length
  const medCnt=defects.filter(d=>d.severity==='medium').length
  const lowCnt=defects.filter(d=>d.severity==='low').length
  const depositPct=cs.deposit?Math.round(totalClaim/cs.deposit*100):0

  return`
    <!-- Top action bar -->
    <div class="flex-between mb-3">
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" onclick="acceptAllAI()">${luc('check-circle',14)} Accept All AI</button>
        <button class="btn btn-ghost btn-sm" onclick="state.wsShortcutsOpen=!state.wsShortcutsOpen;render()" style="display:flex;align-items:center;gap:4px">
          ${luc('info',14)} <span class="text-11">Shortcuts</span> ${luc(state.wsShortcutsOpen?'chevron-up':'chevron-down',12)}
        </button>
      </div>
      <div class="text-sm text-muted" style="display:flex;align-items:center;gap:6px">
        ${reviewed===defects.length?luc('check-circle',14)+'<span style="color:var(--emerald-600);font-weight:600">All reviewed</span>':'<span>'+reviewed+'/'+defects.length+' reviewed</span>'}
      </div>
    </div>

    <!-- Keyboard shortcuts overlay -->
    ${state.wsShortcutsOpen?`
    <div class="card card-p mb-3" style="background:var(--zinc-50);border-color:var(--zinc-200);animation:fadeIn .2s ease">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${[{k:'\u2191 / K',a:'Previous defect'},{k:'\u2193 / J',a:'Next defect'},{k:'T',a:'Set Tenant'},{k:'L',a:'Set Landlord'},{k:'S',a:'Set Shared'},{k:'Enter',a:'Confirm & Next'}].map(s=>`
          <div style="display:flex;align-items:center;gap:8px">
            <span class="ws-kbd">${s.k}</span>
            <span class="text-11 text-muted">${s.a}</span>
          </div>`).join('')}
      </div>
    </div>`:''}

    <!-- Progress ring -->
    <div class="ws-review-progress ${reviewed===defects.length?'complete':''} mb-3">
      <div class="ws-donut" style="flex-shrink:0"><div id="review-progress-ring"></div><div class="ws-donut-label"><div class="font-semibold" style="font-size:16px;line-height:1">${pct}%</div></div></div>
      <div style="flex:1">
        <div class="font-semibold" style="font-size:14px">${reviewed===defects.length?'Review Complete':'Review Progress'}</div>
        <div class="text-sm text-muted mt-1">${reviewed===defects.length?'All '+defects.length+' defects have been reviewed. Continue to deductions.':(defects.length-reviewed)+' defect'+(defects.length-reviewed!==1?'s':'')+' remaining'}</div>
        <div class="ws-stat-bar mt-2" style="height:6px"><div class="ws-stat-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--emerald-400),var(--emerald-600));border-radius:3px"></div></div>
      </div>
    </div>

    <!-- Summary banner -->
    <div class="ws-review-summary mb-3">
      <div>
        <div class="kicker mb-2">Liability Split</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="ws-donut" style="flex-shrink:0"><div id="review-liability-mini"></div></div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--rose-500)"></div><span class="text-11">Tenant: ${tenantCnt}</span></div>
            <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--amber-500)"></div><span class="text-11">Shared: ${sharedCnt}</span></div>
            <div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:var(--sky-500)"></div><span class="text-11">Landlord: ${landlordCnt}</span></div>
          </div>
        </div>
      </div>
      <div>
        <div class="kicker mb-2">Cost Range</div>
        <div class="text-sm font-semibold tabnum">${fmt(minCost)} \u2014 ${fmt(maxCost)}</div>
        <div class="text-11 text-muted mt-1">Total: ${fmt(totalClaim)} (${depositPct}% of deposit)</div>
      </div>
      <div>
        <div class="kicker mb-2">Evidence Quality</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${goodEv?badge(goodEv+' good','badge-emerald'):''}
          ${fairEv?badge(fairEv+' fair','badge-amber'):''}
          ${poorEv?badge(poorEv+' poor','badge-rose'):''}
          ${!goodEv&&!fairEv&&!poorEv?'<span class="text-11 text-muted">No data</span>':''}
        </div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid-3 mb-4" style="grid-template-columns:1fr 1fr 1fr 1fr">
      <div class="stat-card ws-stat-enhanced" style="border-top-color:var(--zinc-500)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="stat-icon" style="background:var(--zinc-100);color:var(--zinc-600);width:28px;height:28px">${luc('shield-alert',14)}</div><div class="stat-label" style="margin:0">Defects</div></div>
        <div class="stat-value tabnum">${defects.length}</div>
        <div style="display:flex;gap:4px;margin-top:6px">
          ${highCnt?'<span style="display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--rose-600)"><span style="width:6px;height:6px;border-radius:50%;background:var(--rose-500)"></span>'+highCnt+' high</span>':''}
          ${medCnt?'<span style="display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--amber-600)"><span style="width:6px;height:6px;border-radius:50%;background:var(--amber-500)"></span>'+medCnt+' med</span>':''}
          ${lowCnt?'<span style="display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--zinc-500)"><span style="width:6px;height:6px;border-radius:50%;background:var(--zinc-400)"></span>'+lowCnt+' low</span>':''}
        </div>
      </div>
      <div class="stat-card ws-stat-enhanced" style="border-top-color:${reviewed===defects.length?'var(--emerald-500)':'var(--amber-500)'}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="stat-icon" style="background:${reviewed===defects.length?'var(--emerald-100);color:var(--emerald-600)':'var(--amber-100);color:var(--amber-600)'};width:28px;height:28px">${luc('check-circle',14)}</div><div class="stat-label" style="margin:0">Reviewed</div></div>
        <div class="stat-value tabnum" style="color:${reviewed===defects.length?'var(--emerald-600)':'var(--amber-600)'}">${reviewed}/${defects.length}</div>
        <div class="ws-stat-bar mt-1"><div class="ws-stat-bar-fill" style="width:${pct}%;background:${reviewed===defects.length?'var(--emerald-500)':'var(--amber-500)'}"></div></div>
        <div class="text-11 text-muted mt-1">${reviewed===defects.length?'All confirmed':(defects.length-reviewed)+' remaining'}</div>
      </div>
      <div class="stat-card ws-stat-enhanced" style="border-top-color:var(--emerald-500)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="stat-icon" style="background:var(--emerald-100);color:var(--emerald-600);width:28px;height:28px">${luc('receipt',14)}</div><div class="stat-label" style="margin:0">Total Exposure</div></div>
        <div class="stat-value tabnum">${fmt(totalClaim)}</div>
        <div class="text-11 text-muted mt-1">${depositPct}% of ${fmt(cs.deposit)} deposit</div>
      </div>
      <div class="stat-card ws-stat-enhanced" style="border-top-color:${excludedCount>0?'var(--rose-400)':'var(--zinc-300)'}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div class="stat-icon" style="background:${excludedCount>0?'var(--rose-100);color:var(--rose-600)':'var(--zinc-100);color:var(--zinc-500)'};width:28px;height:28px">${luc('x-circle',14)}</div><div class="stat-label" style="margin:0">Excluded</div></div>
        <div class="stat-value tabnum" style="color:${excludedCount>0?'var(--rose-600)':'var(--zinc-400)'}">${excludedCount}</div>
        <div class="text-11 text-muted mt-1">${excludedCount>0?'Saving '+fmt(excludedAmt)+' from claim':'None excluded'}</div>
      </div>
    </div>

    <!-- Split panel -->
    <div class="ws-split">
      <!-- Left: Queue -->
      <div>
        <div class="pill-row mb-3" style="flex-wrap:wrap;gap:4px">
          <span class="text-11 text-muted" style="padding:4px 0;margin-right:2px">Liability:</span>
          ${filters.map(f=>`<button onclick="state.wsDefectFilter='${f}';render()" class="pill ${state.wsDefectFilter===f?'active':''}" style="font-size:11px;padding:4px 10px">${f==='all'?'All ('+defects.length+')':f[0].toUpperCase()+f.slice(1)}</button>`).join('')}
        </div>
        <div class="pill-row mb-3" style="flex-wrap:wrap;gap:4px">
          <span class="text-11 text-muted" style="padding:4px 0;margin-right:2px">Trade:</span>
          ${['all','cleaning','damage','maintenance'].map(t=>{const cnt=t==='all'?defects.length:defects.filter(d=>d.type===t).length;return`<button onclick="state.wsTradeFilter='${t}';render()" class="pill ${state.wsTradeFilter===t?'active':''}" style="font-size:11px;padding:4px 10px">${t==='all'?'All Trades':t[0].toUpperCase()+t.slice(1)} (${cnt})</button>`}).join('')}
        </div>
        <div class="flex-between mb-2">
          <span class="text-11 text-muted">${filtered.length} defect${filtered.length!==1?'s':''}</span>
          <span class="text-11 text-muted">${reviewed}/${defects.length} reviewed</span>
        </div>
        <div style="height:3px;background:var(--zinc-100);border-radius:2px;margin-bottom:8px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:var(--emerald-500);border-radius:2px;transition:width .3s"></div>
        </div>
        <div class="ws-queue">
          ${filtered.map((d,i)=>`<div class="ws-defect-card sev-${d.severity} ${state.wsSelectedDefect===d.id?'selected':''} ${d.reviewed&&!d.excluded?'reviewed-done':''} ${d.excluded?'excluded-item':''}" onclick="state.wsSelectedDefect='${d.id}';render()">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div style="display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0">
                <span style="font-weight:700;color:var(--zinc-300);font-size:11px;min-width:16px;padding-top:1px">${i+1}</span>
                <div class="text-sm font-medium" style="line-height:1.3">${d.title}</div>
              </div>
              ${d.excluded?'<span class="badge badge-zinc" style="font-size:9px;flex-shrink:0">Excluded</span>':d.reviewed?'<span class="badge badge-emerald" style="font-size:9px;flex-shrink:0">Done</span>':'<span style="width:8px;height:8px;border-radius:50%;background:var(--amber-400);flex-shrink:0;margin-top:4px"></span>'}
            </div>
            <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
              <span class="badge badge-zinc" style="font-size:10px">${d.room}</span>
              ${badge(d.severity[0].toUpperCase()+d.severity.slice(1),d.severity==='high'?'badge-rose':d.severity==='medium'?'badge-amber':'badge-zinc')}
              ${badge((d.operatorLiability||d.aiLiability)[0].toUpperCase()+(d.operatorLiability||d.aiLiability).slice(1),(d.operatorLiability||d.aiLiability)==='tenant'?'badge-rose':(d.operatorLiability||d.aiLiability)==='landlord'?'badge-sky':'badge-amber')}
              ${confidenceBadge(d.aiConfidence)}
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
              <div class="text-sm font-semibold tabnum">${fmt(d.adjustedCost||d.estimatedCost)}</div>
            </div>
            <div style="height:2px;background:var(--zinc-100);border-radius:1px;margin-top:4px">
              <div style="height:100%;width:${totalClaim?Math.round((d.adjustedCost||d.estimatedCost)/totalClaim*100):0}%;background:var(--zinc-300);border-radius:1px"></div>
            </div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Right: Detail or Onboarding -->
      ${sel?`<div class="card card-p" style="align-self:flex-start;position:sticky;top:0;border-top:3px solid ${sel.severity==='high'?'var(--rose-500)':sel.severity==='medium'?'var(--amber-500)':'var(--zinc-400)'}">
        <div class="flex-between mb-3"><h4>${sel.title}</h4>${badge(sel.severity[0].toUpperCase()+sel.severity.slice(1),sel.severity==='high'?'badge-rose':sel.severity==='medium'?'badge-amber':'badge-zinc')}</div>
        <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"><span class="badge badge-zinc">${sel.room}</span><span class="badge badge-zinc">${sel.type[0].toUpperCase()+sel.type.slice(1)}</span>${sel.reviewed?badge('Reviewed','badge-emerald'):badge('Awaiting Review','badge-amber')}${sel.aiConfidence!=null?`<span style="display:inline-flex;align-items:center;gap:4px">${confidenceBadge(sel.aiConfidence)}</span>`:''}</div>
        <p class="text-sm text-muted" style="line-height:1.5">${sel.desc}</p>

        <!-- Evidence section -->
        <div class="ws-detail-section">
          <div class="ws-section-header"><span style="color:var(--zinc-400)">${luc('image',14)}</span><span class="kicker" style="margin:0">Evidence Comparison</span></div>
          <div class="ws-evidence">
            <div class="ws-evidence-box"><div class="ws-evidence-img" onclick="state.wsLightboxOpen=true;state.wsLightboxTitle='Check-in: ${sel.checkinCond}';render()" style="cursor:pointer">${luc('image',20)} Check-in photo <span class="text-11" style="display:block;margin-top:4px;color:var(--zinc-300)">Click to enlarge</span></div><div class="ws-evidence-label">Check-in: <span class="ws-condition ${sel.checkinCond.toLowerCase()}">${sel.checkinCond}</span></div></div>
            <div class="ws-evidence-box"><div class="ws-evidence-img" onclick="state.wsLightboxOpen=true;state.wsLightboxTitle='Checkout: ${sel.checkoutCond}';render()" style="cursor:pointer">${luc('image',20)} Checkout photo <span class="text-11" style="display:block;margin-top:4px;color:var(--zinc-300)">Click to enlarge</span></div><div class="ws-evidence-label">Checkout: <span class="ws-condition ${sel.checkoutCond.toLowerCase()}">${sel.checkoutCond}</span></div></div>
          </div>
          ${sel.evidenceQuality&&sel.evidenceQuality!=='good'?'<div style="margin-top:8px;padding:8px 10px;background:'+(sel.evidenceQuality==='poor'?'var(--rose-50)':'var(--amber-50)')+';border:1px solid '+(sel.evidenceQuality==='poor'?'#fecdd3':'#fde68a')+';border-radius:var(--radius-sm);font-size:12px;color:'+(sel.evidenceQuality==='poor'?'var(--rose-700)':'var(--amber-700)')+';display:flex;align-items:center;gap:6px">'+luc('alert-triangle',14)+' '+evidenceQualityBadge(sel.evidenceQuality)+' '+(sel.evidenceNotes||'')+'</div>':''}
        </div>

        <!-- Liability section -->
        <div class="ws-detail-section">
          <div class="ws-section-header"><span style="color:var(--zinc-400)">${luc('scale',14)}</span><span class="kicker" style="margin:0">Liability</span></div>
          <div class="ws-liability-group">
            ${['tenant','landlord','shared'].map(l=>`<button class="ws-liability-btn ${(sel.operatorLiability||sel.aiLiability)===l?'active-'+l:''}" onclick="var d=(state.wsDefects||WS_DEFECTS).find(x=>x.id==='${sel.id}');if(d){var prev=d.operatorLiability||d.aiLiability;if(prev!=='${l}')logAudit('${sel.id}','liability',prev,'${l}');d.operatorLiability='${l}';d.reviewed=true};render()">${l[0].toUpperCase()+l.slice(1)}</button>`).join('')}
          </div>
          ${sel.operatorLiability&&sel.operatorLiability!==sel.aiLiability?`<div style="margin-top:6px;padding:6px 10px;background:var(--amber-50);border:1px solid #fde68a;border-radius:var(--radius-sm);font-size:11px;color:var(--amber-700);display:flex;align-items:center;gap:4px">${luc('alert-triangle',12)} Override: AI suggested ${sel.aiLiability}, you set ${sel.operatorLiability}</div>`:`<div class="text-11 text-muted mt-2" style="display:flex;align-items:center;gap:4px">${luc('sparkles',12)} AI suggested: ${sel.aiLiability}</div>`}
        </div>

        <!-- Cost section -->
        <div class="ws-detail-section">
          <div class="ws-section-header"><span style="color:var(--zinc-400)">${luc('receipt',14)}</span><span class="kicker" style="margin:0">Cost Adjustment</span></div>
          <div style="padding:10px;background:var(--zinc-50);border-radius:var(--radius-sm);display:flex;gap:8px;align-items:center">
            <span class="text-sm text-muted">AI estimate: ${fmt(sel.estimatedCost)}</span>
            <input type="number" step="0.01" min="0" class="form-input" style="width:100px;height:34px" value="${sel.adjustedCost||sel.estimatedCost}" onchange="var d=(state.wsDefects||WS_DEFECTS).find(x=>x.id==='${sel.id}');if(d){var prev=d.adjustedCost||d.estimatedCost;var nv=parseFloat(this.value)||0;nv=Math.round(nv*100)/100;if(prev!==nv)logAudit('${sel.id}','cost','\u00a3'+prev,'\u00a3'+nv);d.adjustedCost=nv;d.reviewed=true};render()">
          </div>
        </div>

        <!-- Include/Exclude toggle -->
        <div class="ws-detail-section">
          <div style="display:flex;align-items:center;gap:8px">
            <button class="form-toggle ${sel.excluded?'':'on'}" onclick="var d=(state.wsDefects||WS_DEFECTS).find(x=>x.id==='${sel.id}');if(d){d.excluded=!d.excluded;d.reviewed=true};render()"></button>
            <span class="text-sm">${sel.excluded?'Excluded from claim':'Included in claim'}</span>
          </div>
        </div>

        <!-- AI Rationale -->
        <div class="ws-detail-section">
          <div style="padding:12px;background:var(--zinc-50);border-radius:var(--radius-sm)"><div class="ws-section-header"><span style="color:var(--zinc-400)">${luc('sparkles',14)}</span><span class="kicker" style="margin:0">AI Rationale</span></div><p class="text-xs text-muted" style="line-height:1.5">${sel.rationale}</p></div>
        </div>

        <!-- Depreciation -->
        ${(()=>{const dep=calcDepreciation(sel);if(!dep)return'';return`
        <div class="ws-detail-section">
          <div style="padding:12px;background:var(--sky-50);border:1px solid #bae6fd;border-radius:var(--radius-sm)">
            <div class="kicker mb-2">Betterment / Depreciation</div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px">
              <div><div class="text-11 text-muted">Lifespan</div><div class="text-sm font-semibold">${dep.lifespan} yrs</div></div>
              <div><div class="text-11 text-muted">Age</div><div class="text-sm font-semibold">${dep.age} yrs</div></div>
              <div><div class="text-11 text-muted">Remaining</div><div class="text-sm font-semibold">${dep.remainingPct}%</div></div>
              <div><div class="text-11 text-muted">Max Recovery</div><div class="text-sm font-semibold" style="color:var(--emerald-600)">${fmt(dep.maxRecoverable)}</div></div>
            </div>
            <div style="height:8px;background:var(--zinc-200);border-radius:4px;overflow:hidden;position:relative">
              <div style="height:100%;width:${dep.remainingPct}%;background:linear-gradient(90deg,var(--sky-500),var(--emerald-500));border-radius:4px;transition:width .5s"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:4px">
              <span class="text-11 text-muted">New (0 yrs)</span>
              <span class="text-11 text-muted">End of life (${dep.lifespan} yrs)</span>
            </div>
            ${dep.maxRecoverable<(sel.adjustedCost||sel.estimatedCost)?`<div style="margin-top:8px;padding:8px 10px;background:var(--amber-50);border:1px solid #fde68a;border-radius:var(--radius-sm);font-size:12px;color:var(--amber-700);display:flex;align-items:center;gap:6px">
              ${luc('alert-triangle',14)} Claimed ${fmt(sel.adjustedCost||sel.estimatedCost)} exceeds max recoverable ${fmt(dep.maxRecoverable)}. Consider adjusting.
            </div>`:''}
          </div>
        </div>`;})()}

        <!-- Action buttons -->
        <div style="padding-top:14px;margin-top:14px;border-top:1px solid var(--zinc-200);display:flex;gap:8px">
          <button class="btn btn-accent btn-sm" onclick="var d=(state.wsDefects||WS_DEFECTS).find(x=>x.id==='${sel.id}');if(d)d.reviewed=true;var idx=(state.wsDefects||WS_DEFECTS).findIndex(x=>x.id==='${sel.id}');var next=(state.wsDefects||WS_DEFECTS)[idx+1];if(next)state.wsSelectedDefect=next.id;showToast('Defect reviewed','success');render()">${luc('check',14)} Confirm & Next</button>
          <button class="btn btn-secondary btn-sm" onclick="var d=(state.wsDefects||WS_DEFECTS).find(x=>x.id==='${sel.id}');if(d){d.excluded=true;d.reviewed=true};showToast('Defect excluded','default');render()">${luc('x',14)} Exclude</button>
        </div>
      </div>`:`
      <!-- Onboarding empty state -->
      <div class="ws-onboarding">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--emerald-100);color:var(--emerald-600);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${luc('eye',24)}</div>
        <h3 style="margin-bottom:4px">Select a defect to begin review</h3>
        <p class="text-sm text-muted">Review each defect to confirm liability, adjust costs, and finalise your claim.</p>
        <div class="ws-onboarding-steps">
          <div class="ws-onboarding-step"><span class="step-num">1</span>Set liability (Tenant / Landlord / Shared)</div>
          <div class="ws-onboarding-step"><span class="step-num">2</span>Adjust cost if AI estimate is off</div>
          <div class="ws-onboarding-step"><span class="step-num">3</span>Review evidence and AI rationale</div>
          <div class="ws-onboarding-step"><span class="step-num">4</span>Confirm or exclude each item</div>
        </div>
        <div style="margin-top:20px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
          ${[{k:'\u2191\u2193',a:'Navigate'},{k:'T',a:'Tenant'},{k:'L',a:'Landlord'},{k:'S',a:'Shared'}].map(s=>'<span style="display:inline-flex;align-items:center;gap:4px"><span class="ws-kbd">'+s.k+'</span><span class="text-11 text-muted">'+s.a+'</span></span>').join('')}
        </div>
        ${filtered.length>0?`<button class="btn btn-accent btn-sm mt-4" onclick="state.wsSelectedDefect='${filtered[0].id}';render()">${luc('arrow-right',14)} Review first defect</button>`:''}
      </div>`}
    </div>

    <!-- Audit trail -->
    ${state.wsAuditLog.length>0?`
    <div class="card card-p mt-4">
      <div class="flex-between" style="cursor:pointer" onclick="state.wsAuditExpanded=!state.wsAuditExpanded;render()">
        <div style="display:flex;align-items:center;gap:8px">
          <h4>Audit Trail</h4>
          <span class="badge badge-zinc">${state.wsAuditLog.length} change${state.wsAuditLog.length>1?'s':''}</span>
        </div>
        ${luc(state.wsAuditExpanded?'chevron-up':'chevron-down',16)}
      </div>
      ${state.wsAuditExpanded?`<div class="mt-3 space-y-4">
        ${state.wsAuditLog.slice().reverse().map(e=>`
          <div style="display:flex;gap:10px;padding:10px 12px;background:var(--zinc-50);border-radius:var(--radius-sm);border-left:3px solid var(--amber-400)">
            <div style="flex:1">
              <div class="text-sm font-medium">${e.defectTitle}</div>
              <div class="text-xs text-muted mt-1">${e.field==='liability'?'Liability':'Cost'} changed: <strong>${e.from}</strong> \u2192 <strong>${e.to}</strong></div>
            </div>
            <div class="text-11 text-muted nowrap">${e.timestamp}</div>
          </div>
        `).join('')}
      </div>`:''}
    </div>`:''}

    <!-- Navigation -->
    ${(function(){const r=analysisReadiness(cs);return`<div class="card card-p mt-4" style="background:var(--zinc-50)">
      <div class="flex-between">
        <div>
          <div class="text-sm font-semibold">Analysis &amp; Review readiness</div>
          <div class="text-11 text-muted mt-1">${r.complete} of ${r.total} required items complete${r.allDone?' \u2014 ready to proceed':' \u2014 review every defect before continuing'}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${r.allDone?`<span class="badge badge-emerald">${luc('check-circle',12)} Ready</span>`:`<span class="badge badge-amber">${r.complete}/${r.total} complete</span>`}
          <button class="btn btn-secondary btn-sm" onclick="addManualDefect()">${luc('plus',12)} Add defect</button>
          <button class="btn btn-secondary" onclick="goToStep('readings')">${luc('arrow-left',14)} Back</button>
          <button class="btn ${r.allDone?'btn-accent':'btn-secondary'}" onclick="continueFromAnalysis()">Continue to Deductions ${luc('arrow-right',14)}</button>
        </div>
      </div>
    </div>`})()}`
}

/* ═══════════════════════════════════════════════════════════════
   PAGE: DISPUTES
   ═══════════════════════════════════════════════════════════════ */
function renderDisputes(){
  const allDisputed=CASES.filter(c=>c.status==='disputed'||c.priority==='high')
  const f=state.disputeFilter==='all'?allDisputed:allDisputed.filter(c=>c.priority===state.disputeFilter)
  const searched=state.disputeSearch?f.filter(c=>c.property.toLowerCase().includes(state.disputeSearch.toLowerCase())):f
  const disputeTabs=[{k:'active',l:'Active Disputes'},{k:'bundle',l:'Adjudication Bundle'},{k:'timeline',l:'Dispute Timeline'},{k:'correspondence',l:'Scheme Correspondence'}]
  return`<div class="fade-in space-y-5">
    <div><h2>Disputes</h2><p class="text-muted text-sm mt-1">${allDisputed.length} cases requiring attention</p></div>
    <div class="grid-4">
      <div class="stat-card"><div class="stat-label">Total Disputed</div><div class="stat-value tabnum" style="color:var(--rose-700)">${CASES.filter(c=>c.status==='disputed').length}</div></div>
      <div class="stat-card"><div class="stat-label">High Priority</div><div class="stat-value tabnum" style="color:var(--amber-700)">${allDisputed.filter(c=>c.priority==='high').length}</div></div>
      <div class="stat-card"><div class="stat-label">Total at Risk</div><div class="stat-value tabnum">${fmt(allDisputed.reduce((s,c)=>s+c.claim,0))}</div></div>
      <div class="stat-card"><div class="stat-label">Avg Resolution</div><div class="stat-value tabnum">25d</div></div>
    </div>
    <div class="tabs">${disputeTabs.map(t=>`<button class="tab ${(state.disputeTab||'active')===t.k?'active':''}" onclick="state.disputeTab='${t.k}';render()">${t.l}</button>`).join('')}</div>
    ${(state.disputeTab||'active')==='active'?`
    <div style="display:flex;gap:8px;align-items:center">
      <div class="pill-row">
        ${['all','high','medium','low'].map(p=>`<button onclick="state.disputeFilter='${p}';render()" class="pill ${state.disputeFilter===p?'active':''}">${p==='all'?'All':p[0].toUpperCase()+p.slice(1)}</button>`).join('')}
      </div>
      <input type="text" class="form-input" style="width:200px;height:34px;margin-left:auto" placeholder="Search..." value="${state.disputeSearch}" oninput="state.disputeSearch=this.value;render()">
    </div>
    <div class="space-y-4">
      ${searched.map(c=>`<div class="card card-p" style="cursor:pointer;border-left:3px solid ${c.priority==='high'?'var(--rose-500)':c.priority==='medium'?'var(--amber-500)':'var(--zinc-400)'}" onclick="navigate('workspace','${c.id}')">
        <div class="flex-between"><h4>${c.property.split(',')[0]}</h4><div style="display:flex;gap:6px">${badge(STATUS_META[c.status].label,STATUS_META[c.status].badge)} ${badge(c.priority[0].toUpperCase()+c.priority.slice(1),priBadge(c.priority))}${!c.certificateServed?' '+badge('Cert Missing','badge-rose'):''}</div></div>

/* ═══════════════════════════════════════════════════════════════
   PAGE: DISPUTES — ADJUDICATION BUNDLE TAB

function renderAdjudicationBundle(){
  const cases=BUNDLE_CASES
  if(state.bundleSelectedId===null||state.bundleSelectedId===undefined){
    const avgReadiness=Math.round(cases.reduce((s,c)=>s+c.readiness,0)/cases.length)
    const submissionsDue=cases.filter(c=>c.daysLeft!==null&&c.daysLeft<=7).length
    const totalAtRisk=cases.reduce((s,c)=>s+c.predictedAward.claim,0)
    const stat=s=>{const okC=cases.filter(c=>c.stage===s).length;return okC}
    return`<div class="space-y-5">
      <div class="grid-4">
        <div class="stat-card"><div class="stat-label">Bundles in Progress</div><div class="stat-value tabnum">${cases.filter(c=>c.stage!=='submitted'&&c.stage!=='decision').length}</div></div>
        <div class="stat-card"><div class="stat-label">Avg Readiness</div><div class="stat-value tabnum" style="color:${avgReadiness>=80?'var(--emerald-600)':avgReadiness>=60?'var(--amber-600)':'var(--rose-600)'}">${avgReadiness}%</div></div>
        <div class="stat-card"><div class="stat-label">Due in \u22647 Days</div><div class="stat-value tabnum" style="color:${submissionsDue>0?'var(--rose-700)':'var(--zinc-900)'}">${submissionsDue}</div></div>
        <div class="stat-card"><div class="stat-label">Total at Stake</div><div class="stat-value tabnum">${fmt(totalAtRisk)}</div></div>
      </div>
      <div class="card card-p" style="border-left:3px solid var(--sky-500)">
        <div style="display:flex;align-items:flex-start;gap:8px">${luc('info',16)}<div><div class="text-sm font-medium" style="color:var(--sky-700)">What is an Adjudication Bundle?</div><div class="text-xs text-muted mt-1">A scheme-ready submission pack: signed inventories, dated photos, contractor quotes, certificates, correspondence, statement of case, and an evidence index. Bundles below 70% readiness historically lose ~40% more often.</div></div></div>
      </div>
      <div class="card" style="overflow:hidden">
        <table class="data-table">
          <thead><tr><th>Case</th><th>Scheme</th><th>Stage</th><th>Readiness</th><th>Predicted Award</th><th>Deadline</th><th></th></tr></thead>
          <tbody>
            ${cases.map(c=>{
              const colour=c.readiness>=80?'var(--emerald-500)':c.readiness>=60?'var(--amber-500)':'var(--rose-500)'
              const stageBadge=c.stage==='submitted'?'badge-cyan':c.stage==='decision'?'badge-emerald':c.stage==='review'?'badge-amber':'badge-zinc'
              const stageLabel=(BUNDLE_STAGES.find(s=>s.k===c.stage)||{l:c.stage}).l
              const dlBadge=c.daysLeft===null?'<span class="text-muted text-sm">\u2014</span>':c.daysLeft<=2?`<span class="badge badge-rose">${c.daysLeft}d left</span>`:c.daysLeft<=7?`<span class="badge badge-amber">${c.daysLeft}d left</span>`:`<span class="badge badge-zinc">${c.daysLeft}d left</span>`
              return`<tr style="cursor:pointer" onclick="state.bundleSelectedId='${c.caseId}';render()">
                <td><div class="text-sm font-medium">${c.property}</div><div class="text-11 text-muted">${c.tenant} \u2022 ${c.caseId}</div></td>
                <td class="text-sm">${c.scheme}<div class="text-11 text-muted">${c.ref}</div></td>
                <td>${badge(stageLabel,stageBadge)}</td>
                <td style="min-width:140px"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--zinc-100);border-radius:3px"><div style="height:100%;width:${c.readiness}%;background:${colour};border-radius:3px"></div></div><span class="text-sm font-semibold tabnum" style="color:${colour}">${c.readiness}%</span></div></td>
                <td class="text-sm tabnum">${fmt(c.predictedAward.low)}\u2013${fmt(c.predictedAward.high)}<div class="text-11 text-muted">claim ${fmt(c.predictedAward.claim)}</div></td>
                <td>${dlBadge}<div class="text-11 text-muted">${c.deadline}</div></td>
                <td>${luc('chevron-right',16)}</td>
              </tr>`
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`
  }
  // Detail view for one bundle
  const b=cases.find(c=>c.caseId===state.bundleSelectedId)
  if(!b){state.bundleSelectedId=null;return renderAdjudicationBundle()}
  const okN=b.checklist.filter(i=>i.status==='ok').length
  const weakN=b.checklist.filter(i=>i.status==='weak').length
  const missN=b.checklist.filter(i=>i.status==='missing').length
  const totalN=b.checklist.length
  const colour=b.readiness>=80?'var(--emerald-500)':b.readiness>=60?'var(--amber-500)':'var(--rose-500)'
  const stageIdx=BUNDLE_STAGES.findIndex(s=>s.k===b.stage)
  return`<div class="space-y-5">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn btn-ghost" onclick="state.bundleSelectedId=null;render()">${luc('arrow-left',16)} Back to bundles</button>
    </div>
    <div class="card card-p">
      <div class="flex-between">
        <div><h3>${b.property}</h3><p class="text-muted text-sm mt-1">${b.tenant} \u2022 ${b.caseId} \u2022 ${b.scheme} \u2022 Ref ${b.ref}</p></div>
        <div style="text-align:right"><div class="kicker">Bundle Readiness</div><div style="font-size:32px;font-weight:700;color:${colour}" class="tabnum">${b.readiness}%</div></div>
      </div>
      <div style="display:flex;gap:0;margin-top:16px;border:1px solid var(--zinc-200);border-radius:var(--radius-md);overflow:hidden">
        ${BUNDLE_STAGES.map((s,i)=>{const done=i<=stageIdx;return`<div style="flex:1;padding:10px 12px;text-align:center;background:${done?'var(--emerald-50)':'var(--white)'};border-right:${i<BUNDLE_STAGES.length-1?'1px solid var(--zinc-200)':'none'};font-size:12px;font-weight:${i===stageIdx?600:500};color:${done?'var(--emerald-700)':'var(--zinc-500)'}">${done?luc('check-circle',12)+' ':''}${s.l}</div>`}).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:20px">
      <div class="card card-p">
        <div class="flex-between mb-3"><h4>Gap Checklist</h4><div class="text-xs text-muted">${okN}/${totalN} complete \u2022 ${weakN} weak \u2022 ${missN} missing</div></div>
        <div class="space-y-3">
          ${b.checklist.map(item=>{
            const icon=item.status==='ok'?`<span style="color:var(--emerald-600)">${luc('check-circle',16)}</span>`:item.status==='weak'?`<span style="color:var(--amber-600)">${luc('alert-triangle',16)}</span>`:`<span style="color:var(--rose-600)">${luc('x',16)}</span>`
            const bg=item.status==='ok'?'var(--emerald-50)':item.status==='weak'?'var(--amber-50)':'var(--rose-50)'
            const border=item.status==='ok'?'#bbf7d0':item.status==='weak'?'#fde68a':'#fecdd3'
            return`<div style="padding:10px 12px;background:${bg};border:1px solid ${border};border-radius:var(--radius-sm)">
              <div style="display:flex;align-items:flex-start;gap:8px">
                ${icon}
                <div style="flex:1"><div class="text-sm font-medium">${item.item}</div>${item.action?`<div class="text-11 text-muted mt-1">${item.action}</div>`:''}</div>
                ${item.status!=='ok'?`<button class="btn btn-secondary btn-sm" onclick="showToast('Opened gap fix for: ${item.item.replace(/'/g,'')}','default')">Fix</button>`:''}
              </div>
            </div>`
          }).join('')}
        </div>
      </div>
      <div class="space-y-4">
        <div class="card card-p" style="border-left:3px solid var(--indigo-500)">
          <div class="kicker">Adjudicator Lens</div>
          <div style="font-size:20px;font-weight:700;margin-top:6px" class="tabnum">${fmt(b.predictedAward.low)} \u2013 ${fmt(b.predictedAward.high)}</div>
          <div class="text-11 text-muted">predicted award range \u2022 claim ${fmt(b.predictedAward.claim)}</div>
          <p class="text-xs text-muted mt-3" style="line-height:1.5">${b.predictedAward.note}</p>
        </div>
        <div class="card card-p">
          <div class="flex-between mb-2"><h4>Statement of Case</h4>${badge(b.checklist.find(i=>i.item.includes('Statement'))?.status==='ok'?'Ready':'Draft','badge-zinc')}</div>
          <p class="text-xs text-muted" style="line-height:1.6">Auto-drafted using your evidence and ${b.scheme}'s preferred structure: chronology \u2192 claim items \u2192 evidence index \u2192 counter-arguments to tenant points.</p>
          <div style="display:flex;gap:6px;margin-top:10px">
            <button class="btn btn-secondary btn-sm" onclick="showToast('Narrative opened for editing','default')">${luc('pencil',12)} Edit Narrative</button>
            <button class="btn btn-secondary btn-sm" onclick="showToast('Narrative previewed','default')">${luc('eye',12)} Preview</button>
          </div>
        </div>
        <div class="card card-p">
          <h4 class="mb-2">Evidence Index</h4>
          <div class="space-y-3">
            ${['Exhibit A \u2014 Signed inventory (check-in)','Exhibit B \u2014 Signed inventory (check-out)','Exhibit C \u2014 Photographs (24)','Exhibit D \u2014 Tenancy agreement','Exhibit E \u2014 Contractor quotes','Exhibit F \u2014 Tenant correspondence'].map(x=>`<div class="text-xs" style="display:flex;gap:6px;align-items:center">${luc('file-text',12)}<span>${x}</span></div>`).join('')}
          </div>
        </div>
        <div class="card card-p" style="background:var(--zinc-50)">
          <button class="btn btn-accent" style="width:100%" onclick="showToast('Bundle compiled \u2014 PDF + ZIP downloaded','success')">${luc('file-check',14)} Compile Bundle (PDF + ZIP)</button>
          <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:8px" onclick="showToast('Submitted to ${b.scheme.replace(/'/g,'')}','success')">${luc('send',14)} Submit to ${b.scheme}</button>
        </div>
      </div>
    </div>
  </div>`
}

function renderIntelligence(){
  const tabs=[
    {k:'adjudicator',l:'Adjudicator Patterns'},
    {k:'risk',l:'Portfolio Risk'},
    {k:'elasticity',l:'Recovery Elasticity'},
    {k:'benchmarks',l:'Cost Benchmarks'},
    {k:'predictive',l:'Predictive Scoring'},
    {k:'cohorts',l:'Cohort Analytics'},
    {k:'letters',l:'Letter Effectiveness'},
    {k:'dwell',l:'Deposit Dwell Cost'},
    {k:'assessors',l:'Assessor Quality'},
  ]
  // Hero stats
  const winRate=Math.round(ADJ_PATTERNS.flatMap(s=>s.cells).reduce((sum,c)=>sum+c.rate*c.n,0)/ADJ_PATTERNS.flatMap(s=>s.cells).reduce((sum,c)=>sum+c.n,0))
  const avgRecovery=Math.round(ASSESSORS.reduce((s,a)=>s+a.avgRecovery*a.cases,0)/ASSESSORS.reduce((s,a)=>s+a.cases,0))
  const moneyInLimbo=DWELL_COST.reduce((s,d)=>s+d.heldValue,0)
  const upliftYoY='+14%'
  return`<div class="fade-in space-y-5">
    <div class="flex-between">
      <div><h2>Intelligence</h2><p class="text-muted text-sm mt-1">Forward-looking analytics: why outcomes happen, what's likely next, and what to change</p></div>
      <div style="display:flex;gap:8px">
        <select class="form-input form-select" style="width:160px;height:34px" onchange="showToast('Window: '+this.value,'default')"><option>Last 12 months</option><option>Last 6 months</option><option>Year to date</option><option>All time</option></select>
        <button class="btn btn-secondary btn-sm" onclick="showToast('Intelligence report exported','success')">${luc('download',14)} Export</button>
      </div>
    </div>
    <div class="grid-4">
      <div class="stat-card"><div class="stat-label">Adjudicator Win Rate</div><div class="stat-value tabnum" style="color:var(--emerald-600)">${winRate}%</div><div class="text-11 text-muted mt-1">across all schemes</div></div>
      <div class="stat-card"><div class="stat-label">Avg Recovery</div><div class="stat-value tabnum">${avgRecovery}%</div><div class="text-11 text-muted mt-1">£ awarded / £ claimed</div></div>
      <div class="stat-card"><div class="stat-label">Recovery Uplift YoY</div><div class="stat-value tabnum" style="color:var(--emerald-600)">${upliftYoY}</div><div class="text-11 text-muted mt-1">vs same period 2025</div></div>
      <div class="stat-card"><div class="stat-label">Money in Limbo</div><div class="stat-value tabnum" style="color:var(--amber-700)">${fmt(moneyInLimbo)}</div><div class="text-11 text-muted mt-1">held in undecided cases</div></div>
    </div>
    <div class="tabs">${tabs.map(t=>`<button class="tab ${state.intelTab===t.k?'active':''}" onclick="state.intelTab='${t.k}';state.intelAssessorId=null;render()">${t.l}</button>`).join('')}</div>
    <div class="mt-4">${renderIntelligenceTab()}</div>
  </div>`
}

function renderIntelligenceTab(){
  const t=state.intelTab||'adjudicator'
  if(t==='adjudicator')return renderIntelAdjudicator()
  if(t==='risk')return renderIntelRisk()
  if(t==='elasticity')return renderIntelElasticity()
  if(t==='benchmarks')return renderIntelBenchmarks()
  if(t==='predictive')return renderIntelPredictive()
  if(t==='cohorts')return renderIntelCohorts()
  if(t==='letters')return renderIntelLetters()
  if(t==='dwell')return renderIntelDwell()
  if(t==='assessors')return renderIntelAssessors()
  return''
}

    <h4 class="mb-3">Award Rate by Scheme \u00d7 Defect Type</h4>
    <p class="text-xs text-muted mb-4">% of claims that win at adjudication. Sample sizes shown in parentheses.</p>
    <div style="overflow-x:auto"><table class="data-table" style="min-width:600px">
      <thead><tr><th style="width:200px">Scheme</th>${types.map(t=>`<th style="text-align:center">${t}</th>`).join('')}</tr></thead>

function renderIntelElasticity(){
  const max=Math.max(...ELASTICITY_DATA.map(d=>d.uplift))
  return`<div class="card card-p" style="border-left:3px solid var(--emerald-500)">
    <div style="display:flex;align-items:flex-start;gap:8px">${luc('trending-up',16)}<div><div class="text-sm font-medium" style="color:var(--emerald-700)">Marginal uplift per evidence improvement</div><div class="text-xs text-muted mt-1">Inferred from your historical adjudication outcomes. The numbers below show the average extra £ recovered per change applied.</div></div></div>
  </div>
  <div class="card card-p mt-4">
    <h4 class="mb-4">Recovery Levers</h4>
    <div class="space-y-5">
      ${ELASTICITY_DATA.map(d=>{const pct=(d.uplift/max)*100;const conf=d.confidence==='high'?'badge-emerald':d.confidence==='medium'?'badge-amber':'badge-zinc';return`<div>

function renderIntelAssessors(){
  if(state.intelAssessorId){

    if(!a){state.intelAssessorId=null;return renderIntelAssessors()}
    const c=a.quality>=85?'var(--emerald-500)':a.quality>=70?'var(--amber-500)':'var(--rose-500)'
    return`<div class="space-y-4">
      <button class="btn btn-ghost" onclick="state.intelAssessorId=null;render()">${luc('arrow-left',16)} Back to leaderboard</button>
      <div class="card card-p">
        <div class="flex-between">
          <div><h3>${a.name}</h3><p class="text-muted text-sm mt-1">${a.type} \u2022 ${a.cases} cases assessed</p></div>
          <div style="text-align:right"><div class="kicker">Evidence Quality</div><div style="font-size:32px;font-weight:700;color:${c}" class="tabnum">${a.quality}</div></div>
        </div>
      </div>
      <div class="grid-4">
        <div class="stat-card"><div class="stat-label">Flag Rate</div><div class="stat-value tabnum" style="color:${a.flagRate>20?'var(--rose-600)':a.flagRate>10?'var(--amber-600)':'var(--emerald-600)'}">${a.flagRate}%</div></div>

        <div class="stat-card"><div class="stat-label">Adjudication Win Rate</div><div class="stat-value tabnum" style="color:${a.winRate>=75?'var(--emerald-600)':a.winRate>=60?'var(--amber-600)':'var(--rose-600)'}">${a.winRate}%</div></div>
        <div class="stat-card"><div class="stat-label">Avg Recovery</div><div class="stat-value tabnum">${a.avgRecovery}%</div></div>
      </div>
      <div class="card card-p">
        <h4 class="mb-3">Quality Trend (7 months)</h4>
        <div class="chart-bar-group">${a.trend.map((v,i)=>`<div class="chart-bar" style="height:${v}%;background:${c}" data-bar-height="${v}"><span class="chart-bar-value">${v}</span><span class="chart-bar-label">M${i+1}</span></div>`).join('')}</div>
      </div>
      <div class="card card-p">
        <h4 class="mb-3">Common Evidence Flags</h4>
        ${a.topFlags.length===0?`<div class="text-muted text-sm">No recurring flags \u2014 evidence quality is consistently strong.</div>`:`
        <div class="space-y-3">${a.topFlags.map(f=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:10px 12px;background:var(--rose-50);border:1px solid #fecdd3;border-radius:var(--radius-sm)">${luc('alert-triangle',14)}<span class="text-sm">${f}</span></div>`).join('')}</div>`}
      </div>
      ${a.quality<70?`<div class="card card-p" style="border-left:3px solid var(--rose-500);background:var(--rose-50)">
        <div style="display:flex;gap:8px;align-items:flex-start">${luc('info',16)}<div><div class="text-sm font-medium" style="color:var(--rose-700)">Recommended action</div><div class="text-xs mt-1" style="color:var(--rose-700)">Re-training or reassignment recommended. Reassigning ${a.name}'s properties to a top-quartile assessor could lift portfolio recovery by an estimated \u00a3${Math.round((85-a.quality)*40)}/yr.</div></div></div>
      </div>`:''}
    </div>`
  }
  // Leaderboard

    <div style="display:flex;align-items:flex-start;gap:8px">${luc('sparkles',16)}<div><div class="text-sm font-medium" style="color:var(--violet-700)">${top.name} produces evidence that wins ${top.winRate}% of adjudications. ${bottom.name} sits at ${bottom.winRate}%.</div><div class="text-xs text-muted mt-1">Reassigning ${bottom.name}'s properties could lift portfolio recovery by an estimated \u00a3${Math.round((top.avgRecovery-bottom.avgRecovery)*30)}/yr.</div></div></div>
  </div>
  <div class="card mt-4" style="overflow:hidden"><table class="data-table">
    <thead><tr><th>Assessor</th><th style="text-align:right">Cases</th><th style="text-align:right">Quality</th><th style="text-align:right">Flag Rate</th><th style="text-align:right">Dispute Rate</th><th style="text-align:right">Win Rate</th><th style="text-align:right">Trend</th><th></th></tr></thead>

        <td><div class="text-sm font-medium">${a.name}</div><div class="text-11 text-muted">${a.type}</div></td>
        <td class="text-sm tabnum text-right">${a.cases}</td>
        <td style="text-align:right"><div style="display:inline-flex;align-items:center;gap:6px"><div style="width:48px;height:6px;background:var(--zinc-100);border-radius:3px"><div style="height:100%;width:${a.quality}%;background:${c};border-radius:3px"></div></div><span class="tabnum text-sm font-semibold" style="color:${c}">${a.quality}</span></div></td>
        <td class="text-sm tabnum text-right" style="color:${a.flagRate>20?'var(--rose-600)':a.flagRate>10?'var(--amber-600)':'var(--emerald-600)'}">${a.flagRate}%</td>
        <td class="text-sm tabnum text-right" style="color:${a.disputeRate>30?'var(--rose-600)':a.disputeRate>20?'var(--amber-600)':'var(--emerald-600)'}">${a.disputeRate}%</td>
        <td class="text-sm tabnum text-right" style="color:${a.winRate>=75?'var(--emerald-600)':a.winRate>=60?'var(--amber-600)':'var(--rose-600)'}">${a.winRate}%</td>
        <td style="text-align:right">${trendIcon}</td>
        <td>${luc('chevron-right',16)}</td>
      </tr>`}).join('')}
    </tbody>
  </table></div>`
}

  return`<div class="fade-in space-y-5">
    <div><h2>Communications</h2><p class="text-muted text-sm mt-1">Manage all messages and templates</p></div>

            const msg=thread.find(t=>t.from===name)

          }).join('')}
        </div></div>
      </div>
    </div>
  </div>`
}

  if(state.reportsTab==='recovery'){
    const totalClaimed=RECOVERY_DATA.reduce((s,r)=>s+r.claimed,0);const totalAwarded=RECOVERY_DATA.reduce((s,r)=>s+r.awarded,0);const recoveryRate=Math.round((totalAwarded/totalClaimed)*100);const maxClaimed=Math.max(...RECOVERY_DATA.map(r=>r.claimed));
    return`<div class="grid-3 mb-4">
      <div class="stat-card"><div class="stat-label">Total Claimed</div><div class="stat-value tabnum">${fmt(totalClaimed)}</div></div>

        ${(()=>{const schemes=[...new Set(RECOVERY_DATA.map(r=>r.scheme))];return schemes.map(scheme=>{const schemeData=RECOVERY_DATA.filter(r=>r.scheme===scheme);const claimed=schemeData.reduce((s,r)=>s+r.claimed,0);const awarded=schemeData.reduce((s,r)=>s+r.awarded,0);const rate=claimed>0?Math.round(awarded/claimed*100):0;return`<div><div class="flex-between mb-2"><div class="text-sm font-medium">${scheme}</div><div class="text-sm"><span class="font-semibold tabnum">${rate}%</span> <span class="text-muted">(${fmt(awarded)}/${fmt(claimed)})</span></div></div><div style="height:8px;background:var(--zinc-100);border-radius:4px;overflow:hidden"><div style="height:100%;width:${rate}%;background:var(--emerald-500);border-radius:4px"></div></div></div>`}).join('')})()}
      </div>
    </div>`}
  if(state.reportsTab==='accuracy'){
    var totalAll=AI_ACCURACY_DATA.reduce(function(s,d){return s+d.total},0)
    var agreedAll=AI_ACCURACY_DATA.reduce(function(s,d){return s+d.agreed},0)

    var overallPct=Math.round((agreedAll/totalAll)*100)
    return`<div class="grid-4">
      <div class="stat-card"><div class="stat-label">Total Assessments</div><div class="stat-value tabnum">${totalAll}</div></div>
      <div class="stat-card"><div class="stat-label">AI Agreed</div><div class="stat-value tabnum" style="color:var(--emerald-600)">${agreedAll}</div></div>
      <div class="stat-card"><div class="stat-label">Overridden</div><div class="stat-value tabnum" style="color:var(--amber-600)">${overriddenAll}</div></div>
      <div class="stat-card"><div class="stat-label">Agreement Rate</div><div class="stat-value tabnum" style="color:${overallPct>=80?'var(--emerald-600)':overallPct>=60?'var(--amber-600)':'var(--rose-600)'}">${overallPct}%</div></div>
    </div>
    <div class="card card-p mt-4"><h4 class="mb-4">Agreement Rate by Defect Type</h4>
      <div class="space-y-5">
        ${AI_ACCURACY_DATA.map(d=>`<div>
          <div class="flex-between mb-2"><div class="text-sm font-medium">${d.type[0].toUpperCase()+d.type.slice(1)}</div><div class="text-sm"><span class="font-semibold tabnum">${d.agreePct}%</span> <span class="text-muted">(${d.agreed}/${d.total})</span></div></div>
          <div style="height:12px;background:var(--zinc-100);border-radius:6px;overflow:hidden;display:flex">
            <div style="width:${d.agreePct}%;background:var(--emerald-500);border-radius:6px 0 0 6px" title="Agreed"></div>
            <div style="width:${100-d.agreePct}%;background:var(--amber-400)" title="Overridden"></div>
          </div>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--emerald-500)"></div><span class="text-sm">Operator agreed with AI</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--amber-400)"></div><span class="text-sm">Operator overrode AI</span></div>
      </div>
    </div>
    <div class="card card-p mt-4"><h4 class="mb-4">Recent Overrides</h4>
      <div class="card" style="overflow:hidden"><table class="data-table"><thead><tr><th>Defect</th><th>AI Said</th><th>Changed To</th><th>Operator</th><th>Date</th></tr></thead><tbody>

          <td class="text-sm">${o.defect}</td>

          <td>${badge(o.to==='no_charge'?'No Charge':o.to[0].toUpperCase()+o.to.slice(1),o.to==='tenant'?'badge-rose':o.to==='shared'?'badge-amber':o.to==='landlord'?'badge-sky':'badge-zinc')}</td>

  return''

function renderFeedback(){
  let items=INVENTORY_RETURNS
  if(state.feedbackStatus!=='all')items=items.filter(i=>i.status===state.feedbackStatus)
  if(state.feedbackSearch)items=items.filter(i=>i.property.toLowerCase().includes(state.feedbackSearch.toLowerCase())||i.tenant.toLowerCase().includes(state.feedbackSearch.toLowerCase()))
  const signed=INVENTORY_RETURNS.filter(i=>i.status==='signed').length
  const pending=INVENTORY_RETURNS.filter(i=>i.status==='pending').length
  const flagged=INVENTORY_RETURNS.filter(i=>i.status==='flagged').length
  const statusBadge=s=>s==='signed'?'badge-emerald':s==='flagged'?'badge-rose':s==='pending'?'badge-amber':'badge-zinc'
  const condBadge=c=>c==='Good'?'badge-emerald':c==='Fair'?'badge-amber':c==='Poor'?'badge-rose':'badge-zinc'
  return`<div class="fade-in space-y-5">
    <div class="flex-between"><div><h2>Inventory Feedback</h2><p class="text-muted text-sm mt-1">Returned signed inventories and tenant remarks</p></div></div>
    <div class="grid-4">
      <div class="stat-card"><div class="stat-label">Total Returns</div><div class="stat-value tabnum">${INVENTORY_RETURNS.length}</div></div>
      <div class="stat-card"><div class="stat-label">Signed</div><div class="stat-value tabnum" style="color:var(--emerald-700)">${signed}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value tabnum" style="color:var(--amber-700)">${pending}</div></div>
      <div class="stat-card"><div class="stat-label">Flagged</div><div class="stat-value tabnum" style="color:var(--rose-700)">${flagged}</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="pill-row">${['all','signed','pending','flagged'].map(s=>`<button onclick="state.feedbackStatus='${s}';render()" class="pill ${state.feedbackStatus===s?'active':''}">${s==='all'?'All':s[0].toUpperCase()+s.slice(1)}${s!=='all'?' ('+(s==='signed'?signed:s==='pending'?pending:flagged)+')':''}</button>`).join('')}</div>
      <input type="text" class="form-input" style="width:200px;height:34px;margin-left:auto" placeholder="Search property or tenant..." value="${state.feedbackSearch}" oninput="state.feedbackSearch=this.value;render()">
    </div>
    <div class="space-y-4">
      ${items.map(inv=>{
        const expanded=state.feedbackExpandedId===inv.id
        return`<div class="card" style="overflow:hidden${inv.status==='flagged'?';border-left:3px solid var(--rose-500)':''}">
          <div style="display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer" onclick="state.feedbackExpandedId=state.feedbackExpandedId==='${inv.id}'?null:'${inv.id}';render()">
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:500">${inv.property.split(',')[0]}</span>${badge(inv.status[0].toUpperCase()+inv.status.slice(1),statusBadge(inv.status))}</div>
              <div class="text-muted text-sm mt-1">${inv.tenant} \u2022 ${inv.id}</div>
            </div>
            <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
              ${inv.conditionScore?`<div class="text-center"><div class="kicker">Condition</div><div class="mt-1">${badge(inv.conditionScore,condBadge(inv.conditionScore))}</div></div>`:'<div class="text-center"><div class="kicker">Condition</div><div class="text-muted text-11 mt-1">Awaiting</div></div>'}
              <div class="text-center"><div class="kicker">Rooms</div><div class="text-sm font-semibold mt-1">${inv.rooms}</div></div>
              <div class="text-center"><div class="kicker">Returned</div><div class="text-sm mt-1">${inv.returnDate||'\u2014'}</div></div>
              ${luc(expanded?'chevron-up':'chevron-down',16)}
            </div>
          </div>
          ${expanded?`<div style="border-top:1px solid var(--zinc-100);padding:20px;background:var(--zinc-50)">

function renderGuidance(){
  const categories=[...new Set(GUIDANCE_ARTICLES.map(a=>a.category))]
  const regions=['All','England','Wales','Scotland','N. Ireland']
  let articles=GUIDANCE_ARTICLES
  if(state.guidanceCategory!=='all')articles=articles.filter(a=>a.category===state.guidanceCategory)
  if(state.guidanceRegion!=='all')articles=articles.filter(a=>a.region==='All'||a.region===state.guidanceRegion)
  if(state.guidanceSearch)articles=articles.filter(a=>a.title.toLowerCase().includes(state.guidanceSearch.toLowerCase())||a.summary.toLowerCase().includes(state.guidanceSearch.toLowerCase()))
  return`<div class="fade-in space-y-5">
    <div class="flex-between"><div><h2>Guidance</h2><p class="text-muted text-sm mt-1">${articles.length} knowledge articles</p></div><input type="text" class="form-input" style="width:220px;height:36px" placeholder="Search articles..." value="${state.guidanceSearch}" oninput="state.guidanceSearch=this.value;render()"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="pill-row"><button onclick="state.guidanceCategory='all';render()" class="pill ${state.guidanceCategory==='all'?'active':''}">All Categories</button>${categories.map(c=>`<button onclick="state.guidanceCategory='${c}';render()" class="pill ${state.guidanceCategory===c?'active':''}">${c}</button>`).join('')}</div>
    </div>
    <div class="pill-row">${regions.map(r=>`<button onclick="state.guidanceRegion='${r==='All'?'all':r}';render()" class="pill ${state.guidanceRegion===(r==='All'?'all':r)?'active':''}">${r}</button>`).join('')}</div>
    <div class="grid-2">${articles.map(a=>`
      <div class="card card-p" style="cursor:pointer" onclick="state.guidanceDetailArticle='${a.title.replace(/'/g,"\\'")}';render()"><div class="flex-between"><h4>${a.title}</h4><span class="badge badge-zinc text-11">${a.region}</span></div>
      <p class="text-muted text-sm mt-2">${a.summary}</p>
      <div class="mt-3" style="display:flex;align-items:center;justify-content:space-between"><span class="badge badge-emerald text-11">${a.category}</span><span class="text-11 text-muted" style="display:flex;align-items:center;gap:4px">${luc('arrow-right',12)} Read more</span></div></div>
    `).join('')}</div>
    ${articles.length===0?'<div class="empty-state"><div class="empty-state-icon">'+luc('book-open',20)+'</div><div class="text-sm">No articles match your filters</div><div class="text-11 text-muted mt-1">Try adjusting your search or filters</div></div>':''}
    ${renderGuidanceDetailPanel()}
  </div>`
}
function renderGuidanceDetailPanel(){
  if(!state.guidanceDetailArticle)return''
  const article=GUIDANCE_ARTICLES.find(a=>a.title===state.guidanceDetailArticle)
  if(!article)return''
  const content=GUIDANCE_FULL_CONTENT[article.title]||GUIDANCE_DEFAULT_CONTENT
  const related=GUIDANCE_ARTICLES.filter(a=>a.title!==article.title&&(a.category===article.category||a.region===article.region)).slice(0,4)
  return`<div class="guidance-detail-backdrop" onclick="state.guidanceDetailArticle=null;render()">
    <div class="guidance-detail-panel" onclick="event.stopPropagation()">
      <div style="padding:20px 24px;border-bottom:1px solid var(--zinc-100);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--white);z-index:1">
        <button class="btn btn-ghost" onclick="state.guidanceDetailArticle=null;render()" aria-label="Close article">${luc('x',18)}</button>
        <div style="flex:1"><h3>${article.title}</h3><div style="display:flex;gap:6px;margin-top:4px">${badge(article.category,'badge-emerald')} ${badge(article.region,'badge-zinc')}</div></div>
      </div>
      <div style="padding:24px">
        <div class="guidance-article-body">${content}</div>
        <div style="margin-top:24px;padding:14px;background:var(--zinc-50);border-radius:var(--radius-sm);display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(document.querySelector('.guidance-article-body').innerText);showToast('Article summary copied','success')">${luc('copy',14)} Copy Summary</button>
          <button class="btn btn-secondary btn-sm" onclick="state.wsNegNotes+='\\n[Guidance: ${article.title.replace(/'/g,"\\'")}] '+document.querySelector('.guidance-article-body p')?.innerText?.substring(0,100)+'...';showToast('Inserted into workspace notes','success')">${luc('file-plus',14)} Insert into Notes</button>
        </div>
        ${related.length>0?`<div style="margin-top:24px"><h4 style="margin-bottom:12px">Related Articles</h4>
          <div class="space-y-4">${related.map(r=>`
            <div style="padding:10px 14px;border:1px solid var(--zinc-200);border-radius:var(--radius-sm);cursor:pointer;transition:background .1s" onclick="state.guidanceDetailArticle='${r.title.replace(/'/g,"\\'")}';render()">
              <div class="flex-between"><span class="text-sm font-medium">${r.title}</span><span class="badge badge-zinc" style="font-size:10px">${r.region}</span></div>
              <div class="text-11 text-muted mt-1">${r.summary.substring(0,80)}...</div>
            </div>`).join('')}
          </div>
        </div>`:''}
      </div>
    </div>
  </div>`
}

   PAGE: WHAT'S NEW
   ═══════════════════════════════════════════════════════════════ */
function renderWhatsNew(){
  const typeColors={added:'badge-emerald',improved:'badge-sky',fixed:'badge-amber',removed:'badge-rose'}
  const typeLabels={added:'Added',improved:'Improved',fixed:'Fixed',removed:'Removed'}
  return`<div class="fade-in space-y-5">
    <div><h2>What's New</h2><p class="text-muted text-sm mt-1">Release notes and changelog</p></div>
    <div class="pill-row">${['all','added','improved','fixed'].map(f=>`<button onclick="state.whatsNewFilter='${f}';render()" class="pill ${state.whatsNewFilter===f?'active':''}">${f==='all'?'All':typeLabels[f]}</button>`).join('')}</div>
    <div class="space-y-6">
      ${CHANGELOG.map(v=>{
        const changes=state.whatsNewFilter==='all'?v.changes:v.changes.filter(c=>c.type===state.whatsNewFilter)
        if(changes.length===0)return''
        return`<div class="card card-p">
          <div class="flex-between"><div><span class="badge badge-emerald font-bold">v${v.version}</span><h3 class="mt-2">${v.title}</h3></div><span class="text-muted text-sm">${v.date}</span></div>
          <div class="space-y-4 mt-4">${changes.map(c=>`<div style="display:flex;gap:8px;align-items:flex-start">${badge(typeLabels[c.type],typeColors[c.type])}<span class="text-sm">${c.text}</span></div>`).join('')}</div>
        </div>`
      }).join('')}
    </div>
  </div>`
}
